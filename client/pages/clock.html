<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marchog Systems — World Clock</title>
  <script src="../themes/theme-engine.js"></script>
  <style>
    :root {
      --cyan: var(--theme-primary, #00e5ff);
      --cyan-bright: var(--theme-accent, #40efff);
      --cyan-dim: var(--theme-primary-dim, rgba(0, 229, 255, 0.35));
      --white: var(--theme-text, #e8f0ff);
      --text-primary: var(--theme-text, #e8f0ff);
      --text-secondary: var(--theme-text-dim, #a0c0e0);
      --bg-dark: var(--theme-bg, #020a14);
      --bg-panel: var(--theme-bg-panel, rgba(4, 16, 32, 0.82));
      --border-glow: var(--theme-border, rgba(0, 229, 255, 0.18));
      --danger: var(--theme-danger, #ff4444);
      --warning: var(--theme-warning, #ffaa00);
      --success: var(--theme-success, #00ff88);
      --secondary: var(--theme-secondary, #4a9eff);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-dark);
      font-family: var(--theme-font-body, 'Share Tech Mono'), monospace;
      color: var(--text-primary);
    }
</style>
</head>
<body>
<div id="clock-app">
  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div class="sys-label">Marchog Chronometric Array</div>
      <div id="utc-line">UTC <span id="utc-time">--:--:--</span> · <span id="utc-date">----</span></div>
    </div>
    <div id="header-right">
      <div id="local-time-big">--:--:--</div>
      <div id="local-date">----</div>
    </div>
  </div>

  <!-- Primary clock — large -->
  <div id="primary-zone">
    <div class="zone-label" id="primary-label">LOCAL</div>
    <div class="big-clock" id="primary-clock">--:--:--</div>
    <div class="big-date" id="primary-date">----</div>
    <div class="zone-offset" id="primary-offset">UTC--</div>
  </div>

  <!-- Secondary clocks grid -->
  <div id="zone-grid"></div>

  <!-- Calendar feed -->
  <div id="cal-section">
    <div class="cal-header">
      <span class="cal-title">UPCOMING EVENTS</span>
      <span class="cal-feed-count" id="cal-feed-count"></span>
    </div>
    <div id="cal-list"></div>
    <div id="cal-empty" style="display:none">
      <span class="cal-empty-msg">No feeds configured · Add iCal URLs via page params</span>
    </div>
  </div>

  <!-- Sun bar -->
  <div id="sun-bar">
    <div class="sun-label">DAYLIGHT STATUS</div>
    <div id="sun-strip"></div>
  </div>
</div>

<style>
  #clock-app {
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    grid-template-columns: 38% 1fr;
    gap: 0;
    padding: 12px 16px;
  }

  /* ── Header ── */
  #header {
    grid-column: 1 / -1;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-glow);
    margin-bottom: 10px;
  }
  .sys-label {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--text-secondary); opacity: 0.6;
  }
  #utc-line {
    font-size: 0.85em; color: var(--text-secondary); margin-top: 2px;
  }
  #utc-line span { color: var(--cyan); }
  #header-right { text-align: right; }
  #local-time-big {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 1.8em; font-weight: 700;
    color: var(--cyan); letter-spacing: 0.05em;
  }
  #local-date { font-size: 0.75em; color: var(--text-secondary); }

  /* ── Primary zone — left column ── */
  #primary-zone {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px;
    position: relative;
  }
  .zone-label {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.25em;
    color: var(--text-secondary); margin-bottom: 4px;
  }
  .big-clock {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: clamp(3em, 6vw, 5.5em); font-weight: 900;
    color: var(--cyan); letter-spacing: 0.04em;
    line-height: 1;
  }
  .big-date {
    font-size: 0.9em; color: var(--text-secondary); margin-top: 2px;
  }
  .zone-offset {
    font-size: 0.7em; color: var(--cyan-dim); margin-top: 4px;
    letter-spacing: 0.15em;
  }

  /* ── Zone grid — right column ── */
  #zone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    grid-auto-rows: min-content;
    gap: 8px;
    padding: 0 4px;
    align-content: start;
    overflow-y: auto;
  }
  .zone-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-glow);
    padding: 10px 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .zone-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    opacity: 0.4;
  }
  .zone-card.is-night {
    border-color: var(--theme-border, rgba(0, 229, 255, 0.08));
  }
  .zone-card.is-night .zc-time { opacity: 0.7; }
  .zc-city {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .zc-time {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 1.7em; font-weight: 700;
    color: var(--cyan); line-height: 1.1;
    margin: 2px 0;
  }
  .zc-seconds {
    font-size: 0.45em; font-weight: 400;
    color: var(--text-secondary); vertical-align: super;
  }
  .zc-bottom {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.65em; color: var(--text-secondary);
  }
  .zc-date { opacity: 0.7; }
  .zc-offset { color: var(--cyan-dim); letter-spacing: 0.1em; }
  .zc-day-indicator {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; margin-right: 6px; vertical-align: middle;
  }
  .zc-day-indicator.day { background: var(--warning); box-shadow: 0 0 4px var(--warning); }
  .zc-day-indicator.night { background: var(--secondary); box-shadow: 0 0 4px var(--secondary); }

  /* ── Calendar section — full width below clocks ── */
  #cal-section {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-glow);
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .cal-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 6px;
  }
  .cal-title {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.6em; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--text-secondary); opacity: 0.6;
  }
  .cal-feed-count {
    font-size: 0.55em; color: var(--cyan-dim); letter-spacing: 0.1em;
  }
  #cal-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-content: start;
  }
  #cal-list::-webkit-scrollbar { width: 3px; }
  #cal-list::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

  .cal-event {
    background: var(--bg-panel);
    border: 1px solid var(--border-glow);
    padding: 6px 12px;
    display: flex; align-items: center; gap: 12px;
    flex: 1 1 calc(50% - 6px);
    min-width: 280px;
    position: relative;
    overflow: hidden;
  }
  .cal-event::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--cyan);
    opacity: 0.6;
  }
  .cal-event.is-today::before {
    background: var(--warning);
    opacity: 1;
  }
  .cal-event.is-past {
    opacity: 0.4;
  }
  .cal-date-block {
    text-align: center; min-width: 44px; flex-shrink: 0;
  }
  .cal-month {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.5em; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--text-secondary);
  }
  .cal-day {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 1.4em; font-weight: 700;
    color: var(--cyan); line-height: 1.1;
  }
  .cal-dow {
    font-size: 0.45em; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--cyan-dim);
  }
  .cal-event.is-today .cal-day { color: var(--warning); }
  .cal-details { flex: 1; min-width: 0; }
  .cal-summary {
    font-size: 0.8em; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-meta {
    font-size: 0.6em; color: var(--text-secondary); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-feed-tag {
    font-size: 0.5em; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 1px 6px;
    border: 1px solid var(--border-glow);
    color: var(--cyan-dim);
    flex-shrink: 0;
  }
  .cal-empty-msg {
    font-size: 0.65em; color: var(--text-secondary); opacity: 0.4;
    font-style: italic;
  }

  /* ── Sun bar — bottom ── */
  #sun-bar {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-glow);
  }
  .sun-label {
    font-family: var(--theme-font-heading, 'Orbitron'), sans-serif;
    font-size: 0.55em; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--text-secondary); opacity: 0.5; margin-bottom: 4px;
  }
  #sun-strip {
    display: flex; height: 18px; border-radius: 2px; overflow: hidden;
    border: 1px solid var(--border-glow);
  }
  .sun-seg {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 0.5em; letter-spacing: 0.1em; text-transform: uppercase;
    position: relative;
  }
  .sun-seg.day { background: rgba(255, 170, 0, 0.12); color: var(--warning); }
  .sun-seg.night { background: rgba(74, 158, 255, 0.06); color: var(--secondary); opacity: 0.6; }
  .sun-seg .seg-city { opacity: 0.8; }
  .sun-seg .seg-marker {
    position: absolute; top: -2px; bottom: -2px; width: 2px;
    background: var(--cyan); left: 50%;
    display: none;
  }
</style>

<script>
  // ═══════════════════════════════════════════════════════
  //  Theme engine init
  // ═══════════════════════════════════════════════════════
  MarchogTheme.init();

  // ═══════════════════════════════════════════════════════
  //  MARCHOG WORLD CLOCK — Chronometric Array
  // ═══════════════════════════════════════════════════════

  // Default zones — configurable via URL params
  const DEFAULT_ZONES = [
    { city: 'London',     tz: 'Europe/London'        },
    { city: 'Paris',      tz: 'Europe/Paris'          },
    { city: 'Moscow',     tz: 'Europe/Moscow'         },
    { city: 'Dubai',      tz: 'Asia/Dubai'            },
    { city: 'Mumbai',     tz: 'Asia/Kolkata'          },
    { city: 'Tokyo',      tz: 'Asia/Tokyo'            },
    { city: 'Sydney',     tz: 'Australia/Sydney'      },
    { city: 'Los Angeles',tz: 'America/Los_Angeles'   },
    { city: 'New York',   tz: 'America/New_York'      },
    { city: 'Chicago',    tz: 'America/Chicago'       },
    { city: 'Honolulu',   tz: 'Pacific/Honolulu'      },
    { city: 'São Paulo',  tz: 'America/Sao_Paulo'     },
  ];

  // Parse URL params for custom zones
  function getZones() {
    const params = new URLSearchParams(window.location.search);
    const zonesParam = params.get('zones');
    if (zonesParam) {
      try {
        return JSON.parse(decodeURIComponent(zonesParam));
      } catch(e) { console.warn('Invalid zones param, using defaults'); }
    }
    return DEFAULT_ZONES;
  }

  // Parse primary zone from URL or use local
  function getPrimaryTz() {
    const params = new URLSearchParams(window.location.search);
    return params.get('primary') || null; // null = local
  }

  const ZONES = getZones();
  const PRIMARY_TZ = getPrimaryTz();

  // ── Time helpers ──
  function fmtTime(date, tz, sec = true) {
    const opts = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz };
    if (sec) opts.second = '2-digit';
    return date.toLocaleTimeString('en-GB', opts);
  }

  function fmtDate(date, tz) {
    return date.toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', timeZone: tz
    }).toUpperCase();
  }

  function fmtDateShort(date, tz) {
    return date.toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short', timeZone: tz
    }).toUpperCase();
  }

  function getUTCOffset(date, tz) {
    const utcStr = date.toLocaleString('en-GB', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', hour12: false });
    const tzStr  = date.toLocaleString('en-GB', { timeZone: tz,    hour: '2-digit', minute: '2-digit', hour12: false });
    const [uh, um] = utcStr.split(':').map(Number);
    const [th, tm] = tzStr.split(':').map(Number);
    let diff = (th * 60 + tm) - (uh * 60 + um);
    // Handle day boundary
    if (diff > 720) diff -= 1440;
    if (diff < -720) diff += 1440;
    const sign = diff >= 0 ? '+' : '-';
    const absDiff = Math.abs(diff);
    const h = Math.floor(absDiff / 60);
    const m = absDiff % 60;
    return `UTC${sign}${h}${m > 0 ? ':' + String(m).padStart(2, '0') : ''}`;
  }

  function isDaytime(date, tz) {
    const h = parseInt(date.toLocaleString('en-GB', { hour: '2-digit', hour12: false, timeZone: tz }));
    return h >= 6 && h < 20;
  }

  function getHour(date, tz) {
    return parseInt(date.toLocaleString('en-GB', { hour: '2-digit', hour12: false, timeZone: tz }));
  }

  // ── Build zone cards ──
  const grid = document.getElementById('zone-grid');
  ZONES.forEach((z, i) => {
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.id = `zone-${i}`;
    card.innerHTML = `
      <div class="zc-city">${z.city}</div>
      <div class="zc-time"><span class="zc-hm">--:--</span><span class="zc-seconds">:--</span></div>
      <div class="zc-bottom">
        <span><span class="zc-day-indicator"></span><span class="zc-date">---</span></span>
        <span class="zc-offset">---</span>
      </div>
    `;
    grid.appendChild(card);
  });

  // ── Sun strip ──
  function buildSunStrip(date) {
    const strip = document.getElementById('sun-strip');
    strip.innerHTML = '';
    ZONES.forEach(z => {
      const h = getHour(date, z.tz);
      const isDay = h >= 6 && h < 20;
      const seg = document.createElement('div');
      seg.className = `sun-seg ${isDay ? 'day' : 'night'}`;
      // Abbreviate city name
      const abbr = z.city.length > 6 ? z.city.substring(0, 5) + '.' : z.city;
      seg.innerHTML = `<span class="seg-city">${abbr}</span>`;
      strip.appendChild(seg);
    });
  }

  // ── Main tick ──
  function tick() {
    const now = new Date();

    // UTC
    document.getElementById('utc-time').textContent = fmtTime(now, 'UTC');
    document.getElementById('utc-date').textContent = fmtDateShort(now, 'UTC');

    // Local header
    const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('local-time-big').textContent = fmtTime(now, localTz);
    document.getElementById('local-date').textContent = fmtDate(now, localTz);

    // Primary clock
    const pTz = PRIMARY_TZ || localTz;
    const pLabel = PRIMARY_TZ ? PRIMARY_TZ.split('/').pop().replace(/_/g, ' ').toUpperCase() : 'LOCAL';
    document.getElementById('primary-label').textContent = pLabel;
    document.getElementById('primary-clock').textContent = fmtTime(now, pTz);
    document.getElementById('primary-date').textContent = fmtDate(now, pTz);
    document.getElementById('primary-offset').textContent = getUTCOffset(now, pTz);

    // Zone cards
    ZONES.forEach((z, i) => {
      const card = document.getElementById(`zone-${i}`);
      const time = fmtTime(now, z.tz);
      const [hm, sec] = [time.substring(0, 5), time.substring(5)];
      card.querySelector('.zc-hm').textContent = hm;
      card.querySelector('.zc-seconds').textContent = sec;
      card.querySelector('.zc-date').textContent = fmtDateShort(now, z.tz);
      card.querySelector('.zc-offset').textContent = getUTCOffset(now, z.tz);

      const isDay = isDaytime(now, z.tz);
      card.classList.toggle('is-night', !isDay);
      const indicator = card.querySelector('.zc-day-indicator');
      indicator.className = `zc-day-indicator ${isDay ? 'day' : 'night'}`;
    });

    // Sun strip
    buildSunStrip(now);
  }

  // ── Calendar feeds ──
  const CAL_FEEDS = (() => {
    const params = new URLSearchParams(window.location.search);
    const feeds = [];
    // Support: ?feed=url&feed=url or ?feed1=url&feed2=url or ?feeds=url1,url2
    params.getAll('feed').forEach(u => feeds.push({ url: u }));
    for (let i = 1; i <= 10; i++) {
      const u = params.get(`feed${i}`);
      if (u) feeds.push({ url: u });
    }
    const csv = params.get('feeds');
    if (csv) csv.split(',').map(s => s.trim()).filter(Boolean).forEach(u => feeds.push({ url: u }));
    return feeds;
  })();

  // Minimal iCal parser
  function parseICS(text, feedUrl) {
    const events = [];
    const blocks = text.split('BEGIN:VEVENT');
    const feedName = feedUrl.split('/').pop().replace(/\.ics.*$/, '').substring(0, 20) || 'Feed';
    for (let i = 1; i < blocks.length; i++) {
      const b = blocks[i].split('END:VEVENT')[0];
      const get = (key) => {
        // Handle folded lines (RFC 5545: continuation lines start with space/tab)
        const unfolded = b.replace(/\r?\n[ \t]/g, '');
        const m = unfolded.match(new RegExp(`^${key}[;:](.*)$`, 'm'));
        return m ? m[1].replace(/^.*:/, '') : '';
      };
      const summary = get('SUMMARY') || 'Untitled';
      const location = get('LOCATION') || '';
      const dtStr = get('DTSTART');
      if (!dtStr) continue;
      // Parse date: YYYYMMDD or YYYYMMDDTHHmmssZ or YYYYMMDDTHHmmss
      const dt = parseICalDate(dtStr);
      if (!dt) continue;
      const dtEnd = parseICalDate(get('DTEND')) || dt;
      const allDay = dtStr.length === 8;
      events.push({ summary, location, dt, dtEnd, allDay, feed: feedName });
    }
    return events;
  }

  function parseICalDate(s) {
    if (!s || s.length < 8) return null;
    const y = +s.substring(0, 4), mo = +s.substring(4, 6) - 1, d = +s.substring(6, 8);
    if (s.length >= 15) {
      const h = +s.substring(9, 11), mi = +s.substring(11, 13), sc = +s.substring(13, 15);
      if (s.endsWith('Z')) return new Date(Date.UTC(y, mo, d, h, mi, sc));
      return new Date(y, mo, d, h, mi, sc);
    }
    return new Date(y, mo, d);
  }

  let calEvents = [];

  async function loadCalFeeds() {
    if (CAL_FEEDS.length === 0) {
      document.getElementById('cal-empty').style.display = 'block';
      document.getElementById('cal-feed-count').textContent = '';
      return;
    }
    const allEvents = [];
    let loaded = 0;
    for (const f of CAL_FEEDS) {
      try {
        let text = null;
        // Try direct fetch (works for local/same-origin files)
        try {
          const resp = await fetch(f.url);
          if (resp.ok) {
            const t = await resp.text();
            if (t.includes('BEGIN:VCALENDAR')) text = t;
          }
        } catch { /* CORS — try proxy */ }
        // Fall back to server proxy for external URLs
        if (!text) {
          try {
            const resp = await fetch(`/api/ical-proxy?url=${encodeURIComponent(f.url)}`);
            if (resp.ok) {
              const t = await resp.text();
              if (t.includes('BEGIN:VCALENDAR')) text = t;
            }
          } catch { /* proxy not available */ }
        }
        if (text) {
          allEvents.push(...parseICS(text, f.url));
          loaded++;
        }
      } catch (e) {
        console.warn('Calendar feed failed:', f.url, e);
      }
    }
    calEvents = allEvents.sort((a, b) => a.dt - b.dt);
    document.getElementById('cal-feed-count').textContent =
      `${loaded}/${CAL_FEEDS.length} feeds · ${calEvents.length} events`;
    renderCalendar();
  }

  function renderCalendar() {
    const list = document.getElementById('cal-list');
    const empty = document.getElementById('cal-empty');
    list.innerHTML = '';

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + 90); // Show 90 days ahead

    // Filter: show upcoming + today, plus a few past for context
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const visible = calEvents.filter(e => e.dt >= yesterday && e.dt <= maxDate);

    if (visible.length === 0 && calEvents.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

    visible.forEach(ev => {
      const d = ev.dt;
      const isToday = d >= today && d < new Date(today.getTime() + 86400000);
      const isPast = d < today;

      const timeStr = ev.allDay ? 'ALL DAY' :
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).toUpperCase();
      const meta = [timeStr, ev.location].filter(Boolean).join(' · ');

      const el = document.createElement('div');
      el.className = `cal-event${isToday ? ' is-today' : ''}${isPast ? ' is-past' : ''}`;
      el.innerHTML = `
        <div class="cal-date-block">
          <div class="cal-month">${months[d.getMonth()]}</div>
          <div class="cal-day">${d.getDate()}</div>
          <div class="cal-dow">${days[d.getDay()]}</div>
        </div>
        <div class="cal-details">
          <div class="cal-summary">${ev.summary}</div>
          <div class="cal-meta">${meta}</div>
        </div>
        ${CAL_FEEDS.length > 1 ? `<span class="cal-feed-tag">${ev.feed}</span>` : ''}
      `;
      list.appendChild(el);
    });
  }

  // Start
  tick();
  setInterval(tick, 1000);
  loadCalFeeds();
  setInterval(loadCalFeeds, 5 * 60 * 1000); // Refresh feeds every 5 min
</script>
</body>
</html>
