<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marchog Systems — Weather</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="states_data.js"></script>
  <script src="land_data.js"></script>
  <script src="lakes_data.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan: #00e5ff;
      --cyan-bright: #40efff;
      --cyan-dim: rgba(0, 229, 255, 0.35);
      --white: #e8f0ff;
      --white-bright: #ffffff;
      --text-primary: #e8f0ff;
      --text-secondary: #a0c0e0;
      --bg-dark: #020a14;
      --bg-panel: rgba(4, 16, 32, 0.82);
      --border-glow: rgba(0, 229, 255, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-primary);
    }

    #mapCanvas { position: absolute; top: 0; left: 0; width: 65%; height: 100%; z-index: 1; }
    #globeContainer {
      position: absolute; top: 0; right: 0; width: 35%; height: 55%;
      z-index: 1;
      border-left: 1px solid rgba(0,229,255,0.06);
      border-bottom: 1px solid rgba(0,229,255,0.06);
      background: radial-gradient(ellipse at center, #061020 0%, #010408 100%);
    }
    #globeCanvas { width: 100%; height: 100%; display: block; }
    #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .hud-system {
      position: absolute; top: 10px; left: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5em; font-weight: 500;
      letter-spacing: 0.2em; color: var(--cyan); opacity: 0.5;
    }
    .hud-clock {
      position: absolute; top: 10px; right: 14px; text-align: right;
    }
    .hud-clock-time {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1em,2vw,1.5em); font-weight: 700;
      color: var(--white-bright); letter-spacing: 0.06em;
      text-shadow: 0 0 10px rgba(0,229,255,0.25);
    }
    .hud-clock-date { font-size: 0.65em; color: var(--cyan-bright); }

    .hud-location { position: absolute; top: 30px; left: 14px; }
    .hud-location-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4em,3vw,2.4em); font-weight: 800;
      color: var(--white-bright);
      text-shadow: 0 0 20px rgba(0,229,255,0.4), 0 0 40px rgba(0,229,255,0.15);
    }
    .hud-location-coords {
      font-size: 0.72em; color: var(--cyan-bright); margin-top: 2px;
    }

    .hud-callout { position: absolute; pointer-events: auto; }
    .callout-inner {
      background: var(--bg-panel); border: 1px solid var(--border-glow);
      border-radius: 4px; padding: 10px 14px;
      backdrop-filter: blur(8px); min-width: 160px;
    }
    .callout-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }
    .callout-temp {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2em,4vw,3.2em); font-weight: 900;
      color: var(--white-bright); line-height: 1;
    }
    .callout-temp .unit { font-size: 0.35em; font-weight: 500; color: var(--cyan-bright); vertical-align: super; }
    .callout-condition-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .callout-condition-icon { font-size: 1.3em; }
    .callout-condition-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; font-weight: 600; color: var(--white); letter-spacing: 0.08em;
    }
    .callout-feels { font-size: 0.68em; color: var(--text-secondary); margin-top: 3px; }
    .callout-divider { height: 1px; margin: 7px 0; background: linear-gradient(90deg, var(--cyan-dim), transparent); }
    .callout-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 3px; }
    .callout-label { font-size: 0.62em; color: var(--text-secondary); }
    .callout-val { font-family: 'Orbitron', sans-serif; font-size: 0.72em; font-weight: 600; color: var(--white-bright); }

    .globe-label {
      position: absolute; right: 14px; top: calc(55% + 4px);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.42em; font-weight: 500; letter-spacing: 0.15em;
      color: var(--cyan); opacity: 0.4; text-align: right; width: 35%;
    }

    .hud-forecast { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
    .forecast-strip {
      display: flex; gap: 3px; background: var(--bg-panel);
      border: 1px solid var(--border-glow); border-radius: 4px;
      padding: 6px 10px; backdrop-filter: blur(8px);
    }
    .forecast-day { text-align: center; padding: 3px 8px; min-width: 52px; border-right: 1px solid rgba(0,229,255,0.06); }
    .forecast-day:last-child { border-right: none; }
    .forecast-day-name { font-family: 'Orbitron', sans-serif; font-size: 0.45em; font-weight: 600; color: var(--cyan); letter-spacing: 0.1em; }
    .forecast-day-icon { font-size: 1.1em; margin: 1px 0; }
    .forecast-day-temp { font-size: 0.72em; color: var(--white-bright); }
    .forecast-day-lo { font-size: 0.58em; color: var(--text-secondary); }

    #settingsToggle {
      position: absolute; top: 10px; right: 120px; z-index: 100;
      width: 28px; height: 28px; background: rgba(4,16,32,0.5);
      border: 1px solid var(--border-glow); border-radius: 3px;
      color: var(--text-secondary); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: auto;
    }
    body:hover #settingsToggle { opacity: 1; }
    #settingsPanel {
      position: absolute; top: 44px; right: 14px; z-index: 100;
      width: 260px; background: var(--bg-panel);
      border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 14px; display: none; backdrop-filter: blur(12px); pointer-events: auto;
    }
    #settingsPanel.open { display: block; }
    .settings-title { font-family: 'Orbitron', sans-serif; font-size: 0.6em; font-weight: 600; letter-spacing: 0.12em; color: var(--cyan); margin-bottom: 10px; }
    .setting-group { margin-bottom: 10px; }
    .setting-group label { display: block; font-size: 0.65em; color: var(--text-secondary); margin-bottom: 3px; }
    .setting-group input, .setting-group select {
      width: 100%; background: rgba(4,16,32,0.9); border: 1px solid rgba(0,229,255,0.15);
      color: var(--text-primary); font-family: 'Share Tech Mono', monospace;
      font-size: 0.75em; padding: 5px 8px; border-radius: 3px;
    }
    .btn-apply {
      width: 100%; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
      color: var(--cyan); font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; padding: 7px; border-radius: 3px; cursor: pointer;
    }
    .loading { color: var(--text-secondary); font-size: 0.8em; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <canvas id="mapCanvas"></canvas>
  <div id="globeContainer"><canvas id="globeCanvas"></canvas></div>
  <div id="hud">
    <div class="hud-system">Marchog Planetary Surface Monitor</div>
    <div class="hud-clock">
      <div class="hud-clock-time" id="clock">--:--:--</div>
      <div class="hud-clock-date" id="clockDate">----.--.--</div>
    </div>
    <div class="hud-location">
      <div class="hud-location-name" id="locationName">LOADING...</div>
      <div class="hud-location-coords" id="locationCoords">---.---- N / ---.---- W</div>
    </div>
    <div class="hud-callout" id="callout">
      <div class="callout-inner">
        <div class="callout-temp" id="tempValue"><span class="loading">--</span></div>
        <div class="callout-condition-row">
          <span class="callout-condition-icon" id="conditionIcon"></span>
          <span class="callout-condition-text" id="conditionText">---</span>
        </div>
        <div class="callout-feels" id="feelsLike"></div>
        <div class="callout-divider"></div>
        <div class="callout-row"><span class="callout-label">Wind</span><span class="callout-val" id="windValue">---</span></div>
        <div class="callout-row"><span class="callout-label">Direction</span><span class="callout-val" id="windDir">---</span></div>
        <div class="callout-row"><span class="callout-label">Humidity</span><span class="callout-val" id="humidity">---</span></div>
        <div class="callout-row"><span class="callout-label">Pressure</span><span class="callout-val" id="pressure">---</span></div>
        <div class="callout-row"><span class="callout-label">Visibility</span><span class="callout-val" id="visibility">---</span></div>
        <div class="callout-row"><span class="callout-label">Clouds</span><span class="callout-val" id="cloudCover">---</span></div>
      </div>
    </div>
    <div class="globe-label">Global Position Reference</div>
    <div class="hud-forecast">
      <div class="forecast-strip" id="forecastStrip"><div class="loading" style="padding:8px 20px;">Loading forecast...</div></div>
    </div>
  </div>
  <button id="settingsToggle" onclick="toggleSettings()">&#9881;</button>
  <div id="settingsPanel">
    <div class="settings-title">WEATHER SETTINGS</div>
    <div class="setting-group"><label>Location Name</label><input id="setLocationName" type="text"></div>
    <div class="setting-group"><label>Latitude</label><input id="setLat" type="number" step="0.0001"></div>
    <div class="setting-group"><label>Longitude</label><input id="setLon" type="number" step="0.0001"></div>
    <div class="setting-group"><label>State (abbr)</label><input id="setState" type="text" maxlength="2"></div>
    <div class="setting-group"><label>Units</label><select id="setUnits"><option value="fahrenheit">Fahrenheit</option><option value="celsius">Celsius</option></select></div>
    <button class="btn-apply" onclick="applySettings()">APPLY</button>
  </div>
<script>
// ═══════════════════════════════════════════════════════════════
//  MARCHOG WEATHER — State Zoom + Globe + Tactical HUD v3
// ═══════════════════════════════════════════════════════════════

// STATES_DATA loaded from states_data.js: [{a:'FL',c:[cx,cy],n:['AL','GA'],p:[[[lon,lat],...]]}]
// LAND_DATA loaded from land_data.js: [[[lon,lat],...],...]

// Build lookup
const STATE_MAP = {};
STATES_DATA.forEach(s => STATE_MAP[s.a] = s);

let CFG = {
  lat: 27.5222, lon: -82.5276,
  name: 'ELLENTON, FL', state: 'FL',
  units: 'fahrenheit', refreshInterval: 300000,
};
const params = new URLSearchParams(window.location.search);
if (params.get('lat')) CFG.lat = parseFloat(params.get('lat'));
if (params.get('lon')) CFG.lon = parseFloat(params.get('lon'));
if (params.get('name')) CFG.name = decodeURIComponent(params.get('name')).toUpperCase();
if (params.get('state')) CFG.state = params.get('state').toUpperCase();
if (params.get('units')) CFG.units = params.get('units');

const WMO_CODES = {
  0:{d:'Clear Sky',i:'☀️'},1:{d:'Mainly Clear',i:'🌤️'},2:{d:'Partly Cloudy',i:'⛅'},
  3:{d:'Overcast',i:'☁️'},45:{d:'Fog',i:'🌫️'},48:{d:'Rime Fog',i:'🌫️'},
  51:{d:'Light Drizzle',i:'🌧️'},53:{d:'Mod. Drizzle',i:'🌧️'},55:{d:'Dense Drizzle',i:'🌧️'},
  61:{d:'Slight Rain',i:'🌧️'},63:{d:'Mod. Rain',i:'🌧️'},65:{d:'Heavy Rain',i:'🌧️'},
  71:{d:'Slight Snow',i:'🌨️'},73:{d:'Mod. Snow',i:'🌨️'},75:{d:'Heavy Snow',i:'🌨️'},
  80:{d:'Rain Showers',i:'🌦️'},81:{d:'Mod. Showers',i:'🌦️'},82:{d:'Heavy Showers',i:'⛈️'},
  95:{d:'Thunderstorm',i:'⛈️'},96:{d:'T-Storm+Hail',i:'⛈️'},99:{d:'Heavy T-Storm',i:'⛈️'},
};
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// ═══════════════════════════════════════════════════════════════
//  MAP — Zoomed to ACTIVE STATE (fills ~95% of left panel)
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let MW, MH;

// Compute view bounds: primarily the ACTIVE state, with small padding
function getViewBounds() {
  const active = STATE_MAP[CFG.state];
  if (!active) return { lonMin:-130, lonMax:-63, latMin:22, latMax:52 };

  // Bounding box of ONLY the active state
  let lonMin=999, lonMax=-999, latMin=999, latMax=-999;
  active.p.forEach(ring => ring.forEach(([lon,lat]) => {
    lonMin = Math.min(lonMin, lon); lonMax = Math.max(lonMax, lon);
    latMin = Math.min(latMin, lat); latMax = Math.max(latMax, lat);
  }));

  // Small padding (5%) so state isn't jammed to edges
  const lonPad = (lonMax - lonMin) * 0.05;
  const latPad = (latMax - latMin) * 0.05;
  return {
    lonMin: lonMin - lonPad, lonMax: lonMax + lonPad,
    latMin: latMin - latPad, latMax: latMax + latPad
  };
}

let viewBounds = getViewBounds();

function projectPoint(lon, lat) {
  const b = viewBounds;
  const geoW = b.lonMax - b.lonMin;
  const geoH = b.latMax - b.latMin;
  const geoAspect = geoW / geoH;
  const canvasAspect = MW / MH;
  let mapW, mapH, mapX, mapY;
  if (geoAspect > canvasAspect) {
    mapW = MW * 0.95; mapH = mapW / geoAspect;
    mapX = (MW - mapW) / 2; mapY = (MH - mapH) / 2;
  } else {
    mapH = MH * 0.95; mapW = mapH * geoAspect;
    mapX = (MW - mapW) / 2; mapY = (MH - mapH) / 2;
  }
  return [
    mapX + ((lon - b.lonMin) / geoW) * mapW,
    mapY + ((b.latMax - lat) / geoH) * mapH
  ];
}

function beaconXY() { return projectPoint(CFG.lon, CFG.lat); }

let animT = 0, pulseT = 0;

function drawMap() {
  ctx.clearRect(0, 0, MW, MH);

  // Background gradient
  const bg = ctx.createRadialGradient(MW*0.4, MH*0.45, 0, MW*0.4, MH*0.45, MW*0.8);
  bg.addColorStop(0, '#061020'); bg.addColorStop(0.5, '#030a16'); bg.addColorStop(1, '#010408');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, MW, MH);

  animT += 0.016; pulseT += 0.04;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const activeAbbr = CFG.state;
  const active = STATE_MAP[activeAbbr];
  const neighborSet = active ? new Set(active.n) : new Set();

  // Faint grid
  const b = viewBounds;
  ctx.strokeStyle = 'rgba(0,229,255,0.02)'; ctx.lineWidth = 0.5;
  for (let lat = Math.floor(b.latMin); lat <= Math.ceil(b.latMax); lat++) {
    const [x1,y1] = projectPoint(b.lonMin, lat);
    const [x2,y2] = projectPoint(b.lonMax, lat);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  for (let lon = Math.floor(b.lonMin); lon <= Math.ceil(b.lonMax); lon++) {
    const [x1,y1] = projectPoint(lon, b.latMin);
    const [x2,y2] = projectPoint(lon, b.latMax);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // ── Draw states: active bright, neighbors faded, others hidden ──
  STATES_DATA.forEach(s => {
    const isActive = s.a === activeAbbr;
    const isNeighbor = neighborSet.has(s.a);
    if (!isActive && !isNeighbor) return;

    const fillAlpha = isActive ? 0.05 : 0.01;
    const strokeAlpha = isActive ? 0.5 : 0.08;
    const glowAlpha = isActive ? 0.7 : 0;
    const nodeAlpha = isActive ? 0.5 : 0.1;
    const lw = isActive ? 1.6 : 0.5;

    s.p.forEach(ring => {
      if (ring.length < 4) return;
      const pts = ring.map(([lon,lat]) => projectPoint(lon, lat));

      // Fill
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fillStyle = `rgba(0,229,255,${fillAlpha})`;
      ctx.fill();

      // Glow (active only)
      if (isActive) {
        ctx.shadowColor = `rgba(0,229,255,${glowAlpha})`;
        ctx.shadowBlur = 12;
      }

      // Border stroke
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.strokeStyle = `rgba(0,229,255,${strokeAlpha})`;
      ctx.lineWidth = lw;
      ctx.stroke();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      // Crisp inner line for active
      if (isActive) {
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.strokeStyle = `rgba(0,229,255,${strokeAlpha * 1.4})`;
        ctx.lineWidth = lw * 0.7;
        ctx.stroke();
      }

      // Vertex nodes (active only)
      if (isActive) {
        ring.forEach(([lon, lat]) => {
          const [x,y] = projectPoint(lon, lat);
          ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,229,255,${nodeAlpha})`;
          ctx.fill();
        });
      }
    });
  });

  // Network lines between visible centers
  const visible = STATES_DATA.filter(s => s.a === activeAbbr || neighborSet.has(s.a));
  ctx.strokeStyle = 'rgba(0,229,255,0.03)'; ctx.lineWidth = 0.5;
  for (let i=0; i<visible.length; i++) {
    for (let j=i+1; j<visible.length; j++) {
      const [x1,y1] = projectPoint(visible[i].c[0], visible[i].c[1]);
      const [x2,y2] = projectPoint(visible[j].c[0], visible[j].c[1]);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
  }

  // ── Lakes (major bodies of water) ──
  if (typeof LAKES_DATA !== 'undefined') {
    const b = viewBounds;
    LAKES_DATA.forEach(lake => {
      lake.p.forEach(ring => {
        let inView = false;
        for (const [lon, lat] of ring) {
          if (lon >= b.lonMin && lon <= b.lonMax && lat >= b.latMin && lat <= b.latMax) {
            inView = true; break;
          }
        }
        if (!inView) return;

        const pts = ring.map(([lon, lat]) => projectPoint(lon, lat));
        if (pts.length < 3) return;

        function tracePath() {
          ctx.beginPath();
          ctx.moveTo(pts[0][0], pts[0][1]);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
          ctx.closePath();
        }

        // Dark water fill
        tracePath();
        ctx.fillStyle = 'rgba(0, 8, 24, 0.7)';
        ctx.fill();

        // Glow border (matches active state)
        ctx.shadowColor = 'rgba(0,229,255,0.7)';
        ctx.shadowBlur = 12;
        tracePath();
        ctx.strokeStyle = 'rgba(0,229,255,0.5)';
        ctx.lineWidth = 1.6;
        ctx.stroke();
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

        // Crisp inner line
        tracePath();
        ctx.strokeStyle = 'rgba(0,229,255,0.7)';
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // Vertex nodes
        ring.forEach(([lon, lat]) => {
          const [x, y] = projectPoint(lon, lat);
          ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,229,255,0.5)';
          ctx.fill();
        });
      });
    });
  }

  // ── Location Beacon ──
  const [lx,ly] = beaconXY();
  const pr = 10 + Math.sin(pulseT) * 5;
  const pa = 0.45 + Math.sin(pulseT) * 0.2;
  ctx.beginPath(); ctx.arc(lx,ly,pr*3,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.1})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly,pr*2,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.2})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly,pr*1.2,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.35})`; ctx.lineWidth=1.5; ctx.stroke();
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,pr);
  lg.addColorStop(0,`rgba(0,229,255,${pa})`);
  lg.addColorStop(0.5,`rgba(0,229,255,${pa*0.3})`);
  lg.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle=lg; ctx.fillRect(lx-pr,ly-pr,pr*2,pr*2);
  ctx.shadowColor='rgba(0,229,255,0.9)'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2);
  ctx.fillStyle='#00e5ff'; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;

  // ── Leader line to callout ──
  const callout = document.getElementById('callout');
  if (callout && callout.offsetWidth) {
    const cr = callout.getBoundingClientRect();
    const mr = canvas.getBoundingClientRect();
    const cx = cr.left - mr.left + cr.width + 6;
    const cy = cr.top - mr.top + cr.height * 0.3;
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(cx, cy);
    ctx.strokeStyle = 'rgba(0,229,255,0.2)'; ctx.lineWidth = 1;
    ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,229,255,0.3)'; ctx.fill();
  }

  // Scan line
  const scanY = (animT * 30) % MH;
  const sg = ctx.createLinearGradient(0, scanY-25, 0, scanY+25);
  sg.addColorStop(0,'rgba(0,229,255,0)');
  sg.addColorStop(0.5,'rgba(0,229,255,0.025)');
  sg.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle = sg; ctx.fillRect(0, scanY-25, MW, 50);

  requestAnimationFrame(drawMap);
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS GLOBE — Wireframe + Continent Outlines
// ═══════════════════════════════════════════════════════════════
let globe = {};

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function initGlobe() {
  const container = document.getElementById('globeContainer');
  const gc = document.getElementById('globeCanvas');
  const gw = container.clientWidth, gh = container.clientHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, gw/gh, 0.1, 1000);
  camera.position.z = 2.8;

  const renderer = new THREE.WebGLRenderer({ canvas: gc, alpha: true, antialias: true });
  renderer.setSize(gw, gh);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  // Group for all rotating elements
  const globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // Wireframe sphere (subtle)
  const sphereGeo = new THREE.SphereGeometry(1, 36, 24);
  const sphereMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.04
  });
  globeGroup.add(new THREE.Mesh(sphereGeo, sphereMat));

  // Equator ring
  const ringGeo = new THREE.RingGeometry(1.002, 1.004, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0.12, side: THREE.DoubleSide
  });
  globeGroup.add(new THREE.Mesh(ringGeo, ringMat));

  // Outer glow
  const glowGeo = new THREE.SphereGeometry(1.06, 32, 20);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0.025, side: THREE.BackSide
  });
  globeGroup.add(new THREE.Mesh(glowGeo, glowMat));

  // ── CONTINENT OUTLINES from LAND_DATA ──
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0.25
  });
  LAND_DATA.forEach(ring => {
    if (ring.length < 3) return;
    const points = [];
    ring.forEach(([lon, lat]) => {
      points.push(latLonToVec3(lat, lon, 1.005));
    });
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, lineMat);
    globeGroup.add(line);
  });

  // Location dot
  const locDotGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const locDotMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
  const locDot = new THREE.Mesh(locDotGeo, locDotMat);
  globeGroup.add(locDot);

  function updateLocDot() {
    locDot.position.copy(latLonToVec3(CFG.lat, CFG.lon, 1.02));
  }
  updateLocDot();

  globe = { scene, camera, renderer, globeGroup, locDot, updateLocDot };

  function animateGlobe() {
    requestAnimationFrame(animateGlobe);
    globeGroup.rotation.y += 0.002;
    const s = 1 + Math.sin(Date.now() * 0.003) * 0.3;
    locDot.scale.set(s, s, s);
    locDot.material.opacity = 0.6 + Math.sin(Date.now() * 0.004) * 0.3;
    renderer.render(scene, camera);
  }
  animateGlobe();
}

function resizeGlobe() {
  if (!globe.renderer) return;
  const c = document.getElementById('globeContainer');
  const gw = c.clientWidth, gh = c.clientHeight;
  globe.camera.aspect = gw / gh;
  globe.camera.updateProjectionMatrix();
  globe.renderer.setSize(gw, gh);
}

// ═══════════════════════════════════════════════════════════════
//  HUD POSITIONING + WEATHER DATA + CLOCK + SETTINGS + INIT
// ═══════════════════════════════════════════════════════════════

function positionHUD() {
  const [bx, by] = beaconXY();
  const callout = document.getElementById('callout');
  const cw = callout.offsetWidth || 200;
  const ch = callout.offsetHeight || 220;
  let cx = bx - cw - 50;
  let cy = by - ch * 0.3;
  cx = Math.max(14, Math.min(cx, MW - cw - 14));
  cy = Math.max(80, Math.min(cy, MH - ch - 60));
  callout.style.left = cx + 'px';
  callout.style.top = cy + 'px';
}

function resizeCanvas() {
  const el = document.getElementById('mapCanvas');
  MW = el.width = el.clientWidth;
  MH = el.height = el.clientHeight;
  viewBounds = getViewBounds();
  positionHUD();
  resizeGlobe();
}

async function fetchWeather() {
  const tu = CFG.units === 'celsius' ? 'celsius' : 'fahrenheit';
  const wu = CFG.units === 'celsius' ? 'kmh' : 'mph';
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m,visibility`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
    + `&temperature_unit=${tu}&wind_speed_unit=${wu}&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url); const data = await r.json(); updateUI(data);
  } catch(e) { console.error('[weather]', e); }
}

function updateUI(data) {
  const c = data.current;
  const us = CFG.units === 'celsius' ? '°C' : '°F';
  const ws = CFG.units === 'celsius' ? 'km/h' : 'mph';
  document.getElementById('locationName').textContent = CFG.name;
  document.getElementById('locationCoords').textContent =
    `${Math.abs(CFG.lat).toFixed(4)}° ${CFG.lat>=0?'N':'S'} / ${Math.abs(CFG.lon).toFixed(4)}° ${CFG.lon>=0?'E':'W'}`;
  document.getElementById('tempValue').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">${us}</span>`;
  const wmo = WMO_CODES[c.weather_code] || {d:'Unknown',i:'❓'};
  document.getElementById('conditionIcon').textContent = wmo.i;
  document.getElementById('conditionText').textContent = wmo.d.toUpperCase();
  document.getElementById('feelsLike').textContent = `Feels like ${Math.round(c.apparent_temperature)}${us}`;
  document.getElementById('windValue').textContent = `${Math.round(c.wind_speed_10m)} ${ws}`;
  document.getElementById('windDir').textContent = degToCompass(c.wind_direction_10m);
  document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
  document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
  document.getElementById('visibility').textContent = c.visibility ? `${(c.visibility/1000).toFixed(1)} km` : '---';
  document.getElementById('cloudCover').textContent = `${c.cloud_cover}%`;

  if (data.daily) {
    const strip = document.getElementById('forecastStrip');
    strip.innerHTML = '';
    const d = data.daily;
    for (let i = 0; i < d.time.length; i++) {
      const date = new Date(d.time[i] + 'T12:00:00');
      const dayName = i === 0 ? 'TODAY' : DAYS[date.getDay()];
      const fwmo = WMO_CODES[d.weather_code[i]] || {i:'❓'};
      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `<div class="forecast-day-name">${dayName}</div>
        <div class="forecast-day-icon">${fwmo.i}</div>
        <div class="forecast-day-temp">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="forecast-day-lo">${Math.round(d.temperature_2m_min[i])}°</div>`;
      strip.appendChild(el);
    }
  }
  setTimeout(positionHUD, 50);
}

function degToCompass(deg) {
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16] + ` ${Math.round(deg)}°`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clockDate').textContent = now.toISOString().slice(0,10);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('setLocationName').value = CFG.name;
  document.getElementById('setLat').value = CFG.lat;
  document.getElementById('setLon').value = CFG.lon;
  document.getElementById('setState').value = CFG.state;
  document.getElementById('setUnits').value = CFG.units;
}

function applySettings() {
  const n = document.getElementById('setLocationName').value.trim();
  const lat = parseFloat(document.getElementById('setLat').value);
  const lon = parseFloat(document.getElementById('setLon').value);
  const st = document.getElementById('setState').value.trim().toUpperCase();
  if (n) CFG.name = n.toUpperCase();
  if (!isNaN(lat)) CFG.lat = lat;
  if (!isNaN(lon)) CFG.lon = lon;
  if (st && st.length === 2) CFG.state = st;
  CFG.units = document.getElementById('setUnits').value;
  document.getElementById('settingsPanel').classList.remove('open');
  viewBounds = getViewBounds();
  resizeCanvas();
  fetchWeather();
  if (globe.updateLocDot) globe.updateLocDot();
}

window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.type === 'weatherConfig' || msg.type === 'configure') {
    if (msg.lat) CFG.lat = parseFloat(msg.lat);
    if (msg.lon) CFG.lon = parseFloat(msg.lon);
    if (msg.name) CFG.name = msg.name.toUpperCase();
    if (msg.state) CFG.state = msg.state.toUpperCase();
    if (msg.units) CFG.units = msg.units;
    viewBounds = getViewBounds();
    resizeCanvas(); fetchWeather();
    if (globe.updateLocDot) globe.updateLocDot();
  }
});

// ── INIT ──
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
requestAnimationFrame(drawMap);
initGlobe();
updateClock(); setInterval(updateClock, 1000);
fetchWeather(); setInterval(fetchWeather, CFG.refreshInterval);

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight'].includes(e.key))
    window.parent.postMessage({type:'keydown', key:e.key}, '*');
});
window.parent.postMessage({type:'pageReady', page:'weather'}, '*');
</script>
