<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marchog Systems — Weather</title>
  <style>
    @font-face { font-family: 'Aurebesh'; src: url('../fonts/Aurebesh.otf') format('opentype'); }
    @font-face { font-family: 'Aurebesh'; src: url('../fonts/Aurebesh Bold.otf') format('opentype'); font-weight: bold; }
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan: #00e5ff;
      --cyan-bright: #40efff;
      --cyan-dim: rgba(0, 229, 255, 0.35);
      --cyan-faint: rgba(0, 229, 255, 0.08);
      --teal: #00bfa5;
      --orange: #ff9100;
      --red: #ff3d00;
      --white: #e8f0ff;
      --white-bright: #ffffff;
      --text-primary: #e8f0ff;
      --text-secondary: #a0c0e0;
      --bg-dark: #020a14;
      --bg-panel: rgba(4, 16, 32, 0.8);
      --border-glow: rgba(0, 229, 255, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-primary);
    }

    #mapCanvas { position: absolute; inset: 0; z-index: 1; }

    /* ── HUD Layer (all overlays) ── */
    #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    /* ── Top Left: System ID ── */
    .hud-system {
      position: absolute; top: 10px; left: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5em; font-weight: 500;
      letter-spacing: 0.2em; color: var(--cyan); opacity: 0.5;
      text-transform: uppercase;
    }

    /* ── Top Right: Clock ── */
    .hud-clock {
      position: absolute; top: 10px; right: 14px;
      text-align: right;
    }
    .hud-clock-time {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1em, 2vw, 1.6em);
      font-weight: 700; color: var(--white-bright);
      letter-spacing: 0.06em;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.25);
    }
    .hud-clock-date {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65em; color: var(--cyan-bright);
      letter-spacing: 0.06em;
    }

    /* ── Location Callout (anchored near beacon) ── */
    .hud-callout {
      position: absolute;
      pointer-events: auto;
    }
    .callout-inner {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      position: relative;
      min-width: 180px;
    }
    .callout-inner::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }
    .callout-location {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4em, 3.5vw, 2.8em);
      font-weight: 800; letter-spacing: 0.04em;
      color: var(--white-bright);
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.4), 0 0 40px rgba(0, 229, 255, 0.15);
      line-height: 1.1;
    }
    .callout-coords {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72em; color: var(--cyan-bright);
      letter-spacing: 0.06em; margin-top: 2px;
    }
    .callout-divider {
      height: 1px; margin: 8px 0;
      background: linear-gradient(90deg, var(--cyan-dim), transparent);
    }
    .callout-temp-row {
      display: flex; align-items: baseline; gap: 12px;
    }
    .callout-temp {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.2em, 5vw, 3.8em);
      font-weight: 900; color: var(--white-bright);
      line-height: 1;
      text-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }
    .callout-temp .unit {
      font-size: 0.35em; font-weight: 500;
      color: var(--cyan-bright); vertical-align: super;
    }
    .callout-condition {
      display: flex; flex-direction: column; gap: 1px;
    }
    .callout-condition-icon { font-size: 1.6em; }
    .callout-condition-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; font-weight: 600;
      color: var(--white); letter-spacing: 0.08em;
    }
    .callout-feels {
      font-size: 0.7em; color: var(--text-secondary);
      margin-top: 4px; letter-spacing: 0.03em;
    }
    /* Leader line drawn on canvas */

    /* ── Corner Readouts ── */
    .hud-readout {
      position: absolute;
      pointer-events: auto;
    }
    .readout-block {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 3px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
      min-width: 130px;
    }
    .readout-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.45em; font-weight: 600;
      letter-spacing: 0.15em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .readout-row {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-top: 3px;
    }
    .readout-label {
      font-size: 0.65em; color: var(--text-secondary);
      letter-spacing: 0.03em;
    }
    .readout-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75em; font-weight: 600;
      color: var(--white-bright);
    }

    /* ── Wind Readout (top-right area) ── */
    .hud-wind {
      position: absolute;
      pointer-events: auto;
    }
    .wind-block {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 3px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
      text-align: center;
      min-width: 110px;
    }
    .wind-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.45em; font-weight: 600;
      letter-spacing: 0.15em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: 4px;
    }
    .wind-speed {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2em, 2vw, 1.8em);
      font-weight: 800; color: var(--white-bright);
      line-height: 1;
    }
    .wind-speed .unit {
      font-size: 0.4em; font-weight: 500;
      color: var(--cyan-bright); margin-left: 2px;
    }
    .wind-dir {
      font-size: 0.7em; color: var(--text-secondary);
      margin-top: 3px;
    }
    .wind-gust {
      font-size: 0.6em; color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── Bottom Forecast Strip ── */
    .hud-forecast {
      position: absolute; bottom: 10px;
      left: 50%; transform: translateX(-50%);
      pointer-events: auto;
    }
    .forecast-strip {
      display: flex; gap: 3px;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      padding: 6px 10px;
      backdrop-filter: blur(8px);
    }
    .forecast-day {
      text-align: center; padding: 3px 8px;
      min-width: 52px;
      border-right: 1px solid rgba(0, 229, 255, 0.06);
    }
    .forecast-day:last-child { border-right: none; }
    .forecast-day-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.45em; font-weight: 600;
      color: var(--cyan); letter-spacing: 0.1em;
    }
    .forecast-day-icon { font-size: 1.1em; margin: 1px 0; }
    .forecast-day-temp {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72em; color: var(--white-bright);
    }
    .forecast-day-lo {
      font-size: 0.58em; color: var(--text-secondary);
    }

    /* ── Settings ── */
    #settingsToggle {
      position: absolute; top: 10px; right: 120px; z-index: 100;
      width: 28px; height: 28px;
      background: rgba(4, 16, 32, 0.5);
      border: 1px solid var(--border-glow); border-radius: 3px;
      color: var(--text-secondary); font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; opacity: 0; pointer-events: auto;
    }
    body:hover #settingsToggle { opacity: 1; }
    #settingsToggle:hover { color: var(--cyan); border-color: var(--cyan); }

    #settingsPanel {
      position: absolute; top: 44px; right: 14px; z-index: 100;
      width: 280px; background: var(--bg-panel);
      border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 14px; display: none;
      backdrop-filter: blur(12px); pointer-events: auto;
    }
    #settingsPanel.open { display: block; }
    .settings-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6em; font-weight: 600;
      letter-spacing: 0.12em; color: var(--cyan);
      margin-bottom: 10px; text-transform: uppercase;
    }
    .setting-group { margin-bottom: 10px; }
    .setting-group label {
      display: block; font-size: 0.65em;
      color: var(--text-secondary); margin-bottom: 3px;
    }
    .setting-group input, .setting-group select {
      width: 100%; background: rgba(4, 16, 32, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.15);
      color: var(--text-primary); font-family: 'Share Tech Mono', monospace;
      font-size: 0.75em; padding: 5px 8px; border-radius: 3px;
    }
    .setting-group input:focus, .setting-group select:focus {
      outline: none; border-color: var(--cyan);
    }
    .btn-apply {
      width: 100%; background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.3);
      color: var(--cyan); font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; font-weight: 500;
      letter-spacing: 0.1em; padding: 7px; border-radius: 3px;
      cursor: pointer;
    }
    .btn-apply:hover { background: rgba(0, 229, 255, 0.2); }

    .loading {
      color: var(--text-secondary); font-size: 0.8em;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <canvas id="mapCanvas"></canvas>

  <div id="hud">
    <!-- Top Left: System ID -->
    <div class="hud-system">Marchog Planetary Surface Monitor</div>

    <!-- Top Right: Clock -->
    <div class="hud-clock">
      <div class="hud-clock-time" id="clock">--:--:--</div>
      <div class="hud-clock-date" id="clockDate">----.--.--</div>
    </div>

    <!-- Location Callout (positioned by JS near beacon) -->
    <div class="hud-callout" id="callout">
      <div class="callout-inner">
        <div class="callout-location" id="locationName">LOADING...</div>
        <div class="callout-coords" id="locationCoords">---.---- N / ---.---- W</div>
        <div class="callout-divider"></div>
        <div class="callout-temp-row">
          <div class="callout-temp" id="tempValue"><span class="loading">--</span></div>
          <div class="callout-condition">
            <span class="callout-condition-icon" id="conditionIcon"></span>
            <span class="callout-condition-text" id="conditionText">---</span>
          </div>
        </div>
        <div class="callout-feels" id="feelsLike"></div>
      </div>
    </div>

    <!-- Wind (positioned top-right of map area) -->
    <div class="hud-wind" id="windBlock">
      <div class="wind-block">
        <div class="wind-title">Wind</div>
        <div class="wind-speed" id="windValue">--<span class="unit">mph</span></div>
        <div class="wind-dir" id="windDir">---</div>
        <div class="wind-gust" id="windGust"></div>
      </div>
    </div>

    <!-- Atmosphere (bottom-left corner) -->
    <div class="hud-readout" id="atmoBlock">
      <div class="readout-block">
        <div class="readout-title">Atmosphere</div>
        <div class="readout-row">
          <span class="readout-label">Humidity</span>
          <span class="readout-value" id="humidity">---</span>
        </div>
        <div class="readout-row">
          <span class="readout-label">Pressure</span>
          <span class="readout-value" id="pressure">---</span>
        </div>
        <div class="readout-row">
          <span class="readout-label">Visibility</span>
          <span class="readout-value" id="visibility">---</span>
        </div>
        <div class="readout-row">
          <span class="readout-label">Cloud Cover</span>
          <span class="readout-value" id="cloudCover">---</span>
        </div>
      </div>
    </div>

    <!-- Forecast Strip (bottom center) -->
    <div class="hud-forecast">
      <div class="forecast-strip" id="forecastStrip">
        <div class="loading" style="padding:8px 20px;">Loading forecast...</div>
      </div>
    </div>
  </div>

  <button id="settingsToggle" onclick="toggleSettings()">&#9881;</button>
  <div id="settingsPanel">
    <div class="settings-title">Weather Settings</div>
    <div class="setting-group">
      <label>Location Name</label>
      <input id="setLocationName" type="text" placeholder="e.g. Ellenton, FL">
    </div>
    <div class="setting-group">
      <label>Latitude</label>
      <input id="setLat" type="number" step="0.0001" placeholder="27.5222">
    </div>
    <div class="setting-group">
      <label>Longitude</label>
      <input id="setLon" type="number" step="0.0001" placeholder="-82.5276">
    </div>
    <div class="setting-group">
      <label>Units</label>
      <select id="setUnits">
        <option value="fahrenheit">Fahrenheit</option>
        <option value="celsius">Celsius</option>
      </select>
    </div>
    <button class="btn-apply" onclick="applySettings()">APPLY</button>
  </div>

let W, H;

function projectPoint(lon, lat) {
  const lonMin = -130, lonMax = -63, latMin = 22, latMax = 52;
  const mapW = W * 0.82, mapH = H * 0.72;
  const mapX = (W - mapW) / 2;
  const mapY = (H - mapH) / 2;
  return [
    mapX + ((lon - lonMin) / (lonMax - lonMin)) * mapW,
    mapY + ((latMax - lat) / (latMax - latMin)) * mapH
  ];
}

// ── Map Rendering ──
let animT = 0, pulseT = 0;

function drawMap() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createRadialGradient(W*0.4, H*0.45, 0, W*0.4, H*0.45, W*0.8);
  bg.addColorStop(0, '#061020');
  bg.addColorStop(0.5, '#030a16');
  bg.addColorStop(1, '#010408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  animT += 0.016;
  pulseT += 0.04;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Grid lines (faint lat/lon)
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.02)';
  ctx.lineWidth = 0.5;
  for (let lat = 25; lat <= 50; lat += 5) {
    const [x1,y1] = projectPoint(-130,lat);
    const [x2,y2] = projectPoint(-63,lat);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  for (let lon = -125; lon <= -65; lon += 5) {
    const [x1,y1] = projectPoint(lon,22);
    const [x2,y2] = projectPoint(lon,52);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // State fills
  STATES.forEach(s => {
    s.paths.forEach(path => {
      if (path.length < 3) return;
      ctx.beginPath();
      const [sx,sy] = projectPoint(path[0][0], path[0][1]);
      ctx.moveTo(sx,sy);
      for (let i=1; i<path.length; i++) {
        const [px,py] = projectPoint(path[i][0], path[i][1]);
        ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(0, 229, 255, 0.018)';
      ctx.fill();
    });
  });

  // State borders — glow layer
  ctx.shadowColor = 'rgba(0, 229, 255, 0.5)';
  ctx.shadowBlur = 8;
  drawStateStrokes('rgba(0, 229, 255, 0.14)', 1.5);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // State borders — crisp layer
  drawStateStrokes('rgba(0, 229, 255, 0.3)', 0.8);

  // Vertex nodes
  STATES.forEach(s => {
    s.paths.forEach(path => {
      path.forEach(([lon, lat]) => {
        const [x,y] = projectPoint(lon, lat);
        ctx.beginPath(); ctx.arc(x,y, 1.8, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
        ctx.fill();
      });
    });
  });

  // Network connections between nearby state centers
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.05)';
  ctx.lineWidth = 0.5;
  for (let i=0; i<STATES.length; i++) {
    for (let j=i+1; j<STATES.length; j++) {
      const [x1,y1] = projectPoint(STATES[i].center[0], STATES[i].center[1]);
      const [x2,y2] = projectPoint(STATES[j].center[0], STATES[j].center[1]);
      if (Math.hypot(x2-x1, y2-y1) < W*0.12) {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      }
    }
  }

  // State center dots
  STATES.forEach(s => {
    const [cx,cy] = projectPoint(s.center[0], s.center[1]);
    ctx.beginPath(); ctx.arc(cx,cy, 2.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0, 229, 255, 0.2)'; ctx.fill();
  });

  // ── Location Beacon ──
  const [lx,ly] = beaconXY();
  const pr = 8 + Math.sin(pulseT) * 4;
  const pa = 0.4 + Math.sin(pulseT) * 0.2;

  ctx.beginPath(); ctx.arc(lx,ly, pr*2.5, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,229,255,${pa*0.15})`; ctx.lineWidth=1; ctx.stroke();

  ctx.beginPath(); ctx.arc(lx,ly, pr*1.5, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,229,255,${pa*0.3})`; ctx.lineWidth=1.5; ctx.stroke();

  const lg = ctx.createRadialGradient(lx,ly, 0, lx,ly, pr);
  lg.addColorStop(0, `rgba(0,229,255,${pa})`);
  lg.addColorStop(0.5, `rgba(0,229,255,${pa*0.3})`);
  lg.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = lg;
  ctx.fillRect(lx-pr, ly-pr, pr*2, pr*2);

  ctx.shadowColor='rgba(0,229,255,0.8)'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(lx,ly, 4, 0, Math.PI*2);
  ctx.fillStyle='#00e5ff'; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;

  // ── Leader line from beacon to callout ──
  const callout = document.getElementById('callout');
  if (callout) {
    const cr = callout.getBoundingClientRect();
    // Anchor point: right edge center of callout
    const ax = cr.right + 4;
    const ay = cr.top + cr.height * 0.5;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    // Elbow line
    const midX = (ax + lx) / 2;
    ctx.lineTo(midX, ly);
    ctx.lineTo(midX, ay);
    ctx.lineTo(ax, ay);
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // Small dot at elbow origin
    ctx.beginPath(); ctx.arc(lx, ly, 6, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,229,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
  }

  // Scan line
  const scanY = (animT * 35) % H;
  const sg = ctx.createLinearGradient(0, scanY-20, 0, scanY+20);
  sg.addColorStop(0, 'rgba(0,229,255,0)');
  sg.addColorStop(0.5, 'rgba(0,229,255,0.03)');
  sg.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, scanY-20, W, 40);

  requestAnimationFrame(drawMap);
}

function drawStateStrokes(color, width) {
  STATES.forEach(s => {
    s.paths.forEach(path => {
      if (path.length < 3) return;
      ctx.beginPath();
      const [sx,sy] = projectPoint(path[0][0], path[0][1]);
      ctx.moveTo(sx,sy);
      for (let i=1; i<path.length; i++) {
        const [px,py] = projectPoint(path[i][0], path[i][1]);
        ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  HUD POSITIONING — place overlays relative to map/beacon
// ═══════════════════════════════════════════════════════════════

function positionHUD() {
  const [bx, by] = beaconXY();

  // Callout: left of beacon, vertically centered on it
  const callout = document.getElementById('callout');
  const calloutW = callout.offsetWidth || 260;
  const calloutH = callout.offsetHeight || 160;
  // Place to the left with offset, clamped to viewport
  let cx = bx - calloutW - 80;
  let cy = by - calloutH / 2;
  cx = Math.max(14, Math.min(cx, W - calloutW - 14));
  cy = Math.max(40, Math.min(cy, H - calloutH - 80));
  callout.style.left = cx + 'px';
  callout.style.top = cy + 'px';

  // Wind block: top-right quadrant of the map
  const wind = document.getElementById('windBlock');
  wind.style.right = '14px';
  wind.style.top = (H * 0.12) + 'px';

  // Atmosphere: bottom-left
  const atmo = document.getElementById('atmoBlock');
  atmo.style.left = '14px';
  atmo.style.bottom = '56px';
}

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  positionHUD();
}

// ═══════════════════════════════════════════════════════════════
//  WEATHER DATA (Open-Meteo — free, no API key)
// ═══════════════════════════════════════════════════════════════

async function fetchWeather() {
  const tu = CFG.units === 'celsius' ? 'celsius' : 'fahrenheit';
  const wu = CFG.units === 'celsius' ? 'kmh' : 'mph';
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m,visibility`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
    + `&temperature_unit=${tu}&wind_speed_unit=${wu}`
    + `&timezone=auto&forecast_days=7`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    updateUI(data);
  } catch (e) { console.error('[weather] Fetch failed:', e); }
}

function updateUI(data) {
  const c = data.current;
  const us = CFG.units === 'celsius' ? '°C' : '°F';
  const ws = CFG.units === 'celsius' ? 'km/h' : 'mph';

  document.getElementById('locationName').textContent = CFG.name;
  document.getElementById('locationCoords').textContent =
    `${Math.abs(CFG.lat).toFixed(4)}° ${CFG.lat>=0?'N':'S'} / ${Math.abs(CFG.lon).toFixed(4)}° ${CFG.lon>=0?'E':'W'}`;

  document.getElementById('tempValue').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">${us}</span>`;

  const wmo = WMO_CODES[c.weather_code] || {desc:'Unknown',icon:'❓'};
  document.getElementById('conditionIcon').textContent = wmo.icon;
  document.getElementById('conditionText').textContent = wmo.desc.toUpperCase();

  document.getElementById('feelsLike').textContent =
    `Feels like ${Math.round(c.apparent_temperature)}${us}`;

  document.getElementById('windValue').innerHTML =
    `${Math.round(c.wind_speed_10m)}<span class="unit">${ws}</span>`;
  document.getElementById('windDir').textContent = degToCompass(c.wind_direction_10m);
  document.getElementById('windGust').textContent =
    c.wind_gusts_10m ? `Gusts ${Math.round(c.wind_gusts_10m)} ${ws}` : '';

  document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
  document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
  document.getElementById('visibility').textContent =
    c.visibility ? `${(c.visibility/1000).toFixed(1)} km` : '---';
  document.getElementById('cloudCover').textContent = `${c.cloud_cover}%`;

  // Forecast
  if (data.daily) {
    const strip = document.getElementById('forecastStrip');
    strip.innerHTML = '';
    const d = data.daily;
    for (let i = 0; i < d.time.length; i++) {
      const date = new Date(d.time[i] + 'T12:00:00');
      const dayName = i === 0 ? 'TODAY' : DAYS[date.getDay()];
      const fwmo = WMO_CODES[d.weather_code[i]] || {icon:'❓'};
      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `
        <div class="forecast-day-name">${dayName}</div>
        <div class="forecast-day-icon">${fwmo.icon}</div>
        <div class="forecast-day-temp">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="forecast-day-lo">${Math.round(d.temperature_2m_min[i])}°</div>`;
      strip.appendChild(el);
    }
  }

  // Reposition callout after content changes size
  setTimeout(positionHUD, 50);
}

function degToCompass(deg) {
  const d = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16] + ` ${Math.round(deg)}°`;
}

// ═══════════════════════════════════════════════════════════════
//  CLOCK + SETTINGS + INIT
// ═══════════════════════════════════════════════════════════════

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('clockDate').textContent = now.toISOString().slice(0,10);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('setLocationName').value = CFG.name;
  document.getElementById('setLat').value = CFG.lat;
  document.getElementById('setLon').value = CFG.lon;
  document.getElementById('setUnits').value = CFG.units;
}

function applySettings() {
  const name = document.getElementById('setLocationName').value.trim();
  const lat = parseFloat(document.getElementById('setLat').value);
  const lon = parseFloat(document.getElementById('setLon').value);
  if (name) CFG.name = name.toUpperCase();
  if (!isNaN(lat)) CFG.lat = lat;
  if (!isNaN(lon)) CFG.lon = lon;
  CFG.units = document.getElementById('setUnits').value;
  document.getElementById('settingsPanel').classList.remove('open');
  resizeCanvas();
  fetchWeather();
}

window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.type === 'weatherConfig' || msg.type === 'configure') {
    if (msg.lat) CFG.lat = parseFloat(msg.lat);
    if (msg.lon) CFG.lon = parseFloat(msg.lon);
    if (msg.name) CFG.name = msg.name.toUpperCase();
    if (msg.units) CFG.units = msg.units;
    resizeCanvas();
    fetchWeather();
  }
});

// ── INIT ──
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
requestAnimationFrame(drawMap);
updateClock();
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, CFG.refreshInterval);

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight'].includes(e.key)) {
    window.parent.postMessage({type:'keydown', key:e.key}, '*');
  }
});
window.parent.postMessage({type:'pageReady', page:'weather'}, '*');
</script>
