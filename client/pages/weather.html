<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marchog Systems — Weather</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="states_data.js"></script>
  <script src="land_data.js"></script>
  <script src="lakes_data.js"></script>
  <!-- Moon data -->
  <script src="data/moon/moon_data.js"></script>
  <script src="data/moon/mare_boundaries.js"></script>
  <script src="data/moon/moon_regions.js"></script>
  <!-- Mars data -->
  <script src="data/mars/mars_data.js"></script>
  <script src="data/mars/mars_regions.js"></script>
  <script src="data/mars/mars_geology.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan: #00e5ff;
      --cyan-bright: #40efff;
      --cyan-dim: rgba(0, 229, 255, 0.35);
      --white: #e8f0ff;
      --white-bright: #ffffff;
      --text-primary: #e8f0ff;
      --text-secondary: #a0c0e0;
      --bg-dark: #020a14;
      --bg-panel: rgba(4, 16, 32, 0.82);
      --border-glow: rgba(0, 229, 255, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-primary);
    }

    #mapCanvas { position: absolute; top: 0; left: 0; width: 65%; height: 100%; z-index: 1; }
    #polarGlobeContainer {
      position: absolute; top: 0; left: 0; width: 65%; height: 100%;
      z-index: 1; background: #010408; display: none;
    }
    #polarGlobeCanvas { width: 100%; height: 100%; display: block; }
    #globeContainer {
      position: absolute; top: 0; right: 0; width: 35%; height: 50%;
      z-index: 2;
      border-left: 1px solid rgba(0,229,255,0.06);
      border-bottom: 1px solid rgba(0,229,255,0.06);
      background: #010408;
    }
    #globeCanvas { width: 100%; height: 100%; display: block; }

    /* ── Weather Panel — bottom-right 35% × 50% ── */
    #weatherPanel {
      position: absolute; bottom: 0; right: 0;
      width: 35%; height: 50%;
      z-index: 2;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-glow);
      border-top: 1px solid var(--border-glow);
      backdrop-filter: blur(8px);
      padding: 14px 18px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #weatherPanel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: 0.5;
    }

    .wp-temp {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.4em, 5vw, 4em); font-weight: 900;
      color: var(--white-bright); line-height: 1;
      text-shadow: 0 0 14px rgba(0,229,255,0.2);
    }
    .wp-temp .unit { font-size: 0.3em; font-weight: 500; color: var(--cyan-bright); vertical-align: super; }
    .wp-condition-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .wp-condition-icon { font-size: 1.5em; }
    .wp-condition-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6em; font-weight: 600; color: var(--white); letter-spacing: 0.08em;
    }
    .wp-feels { font-size: 0.72em; color: var(--text-secondary); margin-top: 2px; }
    .wp-divider { height: 1px; margin: 8px 0; background: linear-gradient(90deg, var(--cyan-dim), transparent); }
    .wp-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
    }
    .wp-row { display: flex; justify-content: space-between; align-items: baseline; }
    .wp-label { font-size: 0.62em; color: var(--text-secondary); }
    .wp-val { font-family: 'Orbitron', sans-serif; font-size: 0.72em; font-weight: 600; color: var(--white-bright); }

    .wp-forecast-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.4em; font-weight: 500; letter-spacing: 0.15em;
      color: var(--cyan); opacity: 0.6; margin-top: auto; margin-bottom: 4px;
    }
    .wp-forecast-strip {
      display: flex; gap: 2px;
    }
    .wp-forecast-day { text-align: center; flex: 1; padding: 3px 2px; border-right: 1px solid rgba(0,229,255,0.06); }
    .wp-forecast-day:last-child { border-right: none; }
    .wp-forecast-day-name { font-family: 'Orbitron', sans-serif; font-size: 0.4em; font-weight: 600; color: var(--cyan); letter-spacing: 0.08em; }
    .wp-forecast-day-icon { font-size: 1em; margin: 1px 0; }
    .wp-forecast-day-temp { font-size: 0.68em; color: var(--white-bright); }
    .wp-forecast-day-lo { font-size: 0.52em; color: var(--text-secondary); }

    /* ── Leader line canvas (full viewport, behind panels) ── */
    #leaderCanvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .hud-system {
      position: absolute; top: 10px; left: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5em; font-weight: 500;
      letter-spacing: 0.2em; color: var(--cyan); opacity: 0.5;
    }
    .hud-clock {
      position: absolute; top: 10px; right: 14px; text-align: right;
    }
    .hud-clock-time {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1em,2vw,1.5em); font-weight: 700;
      color: var(--white-bright); letter-spacing: 0.06em;
      text-shadow: 0 0 10px rgba(0,229,255,0.25);
    }
    .hud-clock-date { font-size: 0.65em; color: var(--cyan-bright); }

    .hud-location { position: absolute; top: 30px; left: 14px; }
    .hud-location-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4em,3vw,2.4em); font-weight: 800;
      color: var(--white-bright);
      text-shadow: 0 0 20px rgba(0,229,255,0.4), 0 0 40px rgba(0,229,255,0.15);
    }
    .hud-location-coords {
      font-size: 0.72em; color: var(--cyan-bright); margin-top: 2px;
    }

    #settingsToggle {
      position: absolute; top: 10px; right: 120px; z-index: 100;
      width: 28px; height: 28px; background: rgba(4,16,32,0.5);
      border: 1px solid var(--border-glow); border-radius: 3px;
      color: var(--text-secondary); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: auto;
    }
    body:hover #settingsToggle { opacity: 1; }
    #settingsPanel {
      position: absolute; top: 44px; right: 14px; z-index: 100;
      width: 260px; background: var(--bg-panel);
      border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 14px; display: none; backdrop-filter: blur(12px); pointer-events: auto;
    }
    #settingsPanel.open { display: block; }
    .settings-title { font-family: 'Orbitron', sans-serif; font-size: 0.6em; font-weight: 600; letter-spacing: 0.12em; color: var(--cyan); margin-bottom: 10px; }
    .setting-group { margin-bottom: 10px; }
    .setting-group label { display: block; font-size: 0.65em; color: var(--text-secondary); margin-bottom: 3px; }
    .setting-group input, .setting-group select {
      width: 100%; background: rgba(4,16,32,0.9); border: 1px solid rgba(0,229,255,0.15);
      color: var(--text-primary); font-family: 'Share Tech Mono', monospace;
      font-size: 0.75em; padding: 5px 8px; border-radius: 3px;
    }
    .btn-apply {
      width: 100%; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
      color: var(--cyan); font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; padding: 7px; border-radius: 3px; cursor: pointer;
    }
    .loading { color: var(--text-secondary); font-size: 0.8em; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── Body Selector (Earth / Luna / Mars) ── */
    #bodySelector {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; gap: 2px;
      background: rgba(4,16,32,0.7); border: 1px solid var(--border-glow);
      border-radius: 4px; padding: 2px; pointer-events: auto;
      opacity: 0; transition: opacity 0.3s;
    }
    body:hover #bodySelector { opacity: 1; }
    .body-btn {
      font-family: 'Orbitron', sans-serif; font-size: 0.45em; font-weight: 600;
      letter-spacing: 0.12em; padding: 5px 14px;
      background: transparent; border: 1px solid transparent;
      color: var(--text-secondary); cursor: pointer; border-radius: 3px;
      transition: all 0.2s;
    }
    .body-btn:hover { color: var(--cyan); border-color: rgba(0,229,255,0.2); }
    .body-btn.active {
      color: var(--cyan-bright); background: rgba(0,229,255,0.1);
      border-color: rgba(0,229,255,0.4);
      text-shadow: 0 0 8px rgba(0,229,255,0.3);
    }
  </style>

<body>
  <canvas id="mapCanvas"></canvas>
  <canvas id="leaderCanvas"></canvas>
  <div id="polarGlobeContainer" style="display:none;"><canvas id="polarGlobeCanvas"></canvas></div>
  <div id="globeContainer"><canvas id="globeCanvas"></canvas></div>

  <!-- Weather Panel — bottom-right -->
  <div id="weatherPanel">
    <div class="wp-temp" id="tempValue"><span class="loading">--</span></div>
    <div class="wp-condition-row">
      <span class="wp-condition-icon" id="conditionIcon"></span>
      <span class="wp-condition-text" id="conditionText">---</span>
    </div>
    <div class="wp-feels" id="feelsLike"></div>
    <div class="wp-divider"></div>
    <div class="wp-grid">
      <div class="wp-row"><span class="wp-label">Wind</span><span class="wp-val" id="windValue">---</span></div>
      <div class="wp-row"><span class="wp-label">Direction</span><span class="wp-val" id="windDir">---</span></div>
      <div class="wp-row"><span class="wp-label">Humidity</span><span class="wp-val" id="humidity">---</span></div>
      <div class="wp-row"><span class="wp-label">Pressure</span><span class="wp-val" id="pressure">---</span></div>
      <div class="wp-row"><span class="wp-label">Visibility</span><span class="wp-val" id="visibility">---</span></div>
      <div class="wp-row"><span class="wp-label">Clouds</span><span class="wp-val" id="cloudCover">---</span></div>
    </div>
    <div class="wp-forecast-label" id="forecastLabel">7-DAY FORECAST</div>
    <div class="wp-forecast-strip" id="forecastStrip">
      <div class="loading" style="padding:4px 10px;">Loading...</div>
    </div>
  </div>

  <!-- HUD overlays (location name, clock) -->
  <div id="hud">
    <div class="hud-system">Marchog Planetary Surface Monitor</div>
    <div class="hud-clock">
      <div class="hud-clock-time" id="clock">--:--:--</div>
      <div class="hud-clock-date" id="clockDate">----.--.--</div>
    </div>
    <div class="hud-location">
      <div class="hud-location-name" id="locationName">LOADING...</div>
      <div class="hud-location-coords" id="locationCoords">---.---- N / ---.---- W</div>
    </div>
  </div>
  <button id="settingsToggle" onclick="toggleSettings()">&#9881;</button>
  <div id="bodySelector">
    <button class="body-btn active" data-body="earth" onclick="switchBody('earth')">EARTH</button>
    <button class="body-btn" data-body="luna" onclick="switchBody('luna')">LUNA</button>
    <button class="body-btn" data-body="mars" onclick="switchBody('mars')">MARS</button>
  </div>
  <div id="settingsPanel">
    <div class="settings-title">WEATHER SETTINGS</div>
    <div class="setting-group"><label>Location Name</label><input id="setLocationName" type="text"></div>
    <div class="setting-group"><label>Latitude</label><input id="setLat" type="number" step="0.0001"></div>
    <div class="setting-group"><label>Longitude</label><input id="setLon" type="number" step="0.0001"></div>
    <div class="setting-group"><label>State (abbr)</label><input id="setState" type="text" maxlength="2"></div>
    <div class="setting-group"><label>Units</label><select id="setUnits"><option value="fahrenheit">Fahrenheit</option><option value="celsius">Celsius</option></select></div>
    <button class="btn-apply" onclick="applySettings()">APPLY</button>
  </div>
<script>
// ═══════════════════════════════════════════════════════════════
//  MARCHOG WEATHER — State Zoom + Globe + Tactical HUD v3
//  Multi-body: Earth / Luna / Mars
// ═══════════════════════════════════════════════════════════════

let currentBody = 'earth';  // 'earth' | 'luna' | 'mars'

// STATES_DATA loaded from states_data.js: [{a:'FL',c:[cx,cy],n:['AL','GA'],p:[[[lon,lat],...]]}]
// LAND_DATA loaded from land_data.js: [[[lon,lat],...],...]

// Build lookup
const STATE_MAP = {};
STATES_DATA.forEach(s => STATE_MAP[s.a] = s);

let CFG = {
  lat: 27.5222, lon: -82.5276,
  name: 'ELLENTON, FL', state: 'FL',
  units: 'fahrenheit', refreshInterval: 300000,
};
const params = new URLSearchParams(window.location.search);
if (params.get('lat')) CFG.lat = parseFloat(params.get('lat'));
if (params.get('lon')) CFG.lon = parseFloat(params.get('lon'));
if (params.get('name')) CFG.name = decodeURIComponent(params.get('name')).toUpperCase();
if (params.get('state')) CFG.state = params.get('state').toUpperCase();
if (params.get('units')) CFG.units = params.get('units');

const WMO_CODES = {
  0:{d:'Clear Sky',i:'☀️'},1:{d:'Mainly Clear',i:'🌤️'},2:{d:'Partly Cloudy',i:'⛅'},
  3:{d:'Overcast',i:'☁️'},45:{d:'Fog',i:'🌫️'},48:{d:'Rime Fog',i:'🌫️'},
  51:{d:'Light Drizzle',i:'🌧️'},53:{d:'Mod. Drizzle',i:'🌧️'},55:{d:'Dense Drizzle',i:'🌧️'},
  61:{d:'Slight Rain',i:'🌧️'},63:{d:'Mod. Rain',i:'🌧️'},65:{d:'Heavy Rain',i:'🌧️'},
  71:{d:'Slight Snow',i:'🌨️'},73:{d:'Mod. Snow',i:'🌨️'},75:{d:'Heavy Snow',i:'🌨️'},
  80:{d:'Rain Showers',i:'🌦️'},81:{d:'Mod. Showers',i:'🌦️'},82:{d:'Heavy Showers',i:'⛈️'},
  95:{d:'Thunderstorm',i:'⛈️'},96:{d:'T-Storm+Hail',i:'⛈️'},99:{d:'Heavy T-Storm',i:'⛈️'},
};
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// ═══════════════════════════════════════════════════════════════
//  MAP — Zoomed to ACTIVE STATE (fills ~95% of left panel)
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let MW, MH;

// Compute view bounds: primarily the ACTIVE state, with small padding
function getViewBounds() {
  // Non-Earth bodies: zoom to selected feature region
  if (currentBody !== 'earth') {
    const features = getCelestialFeatures();
    const regions = features.filter(f => f.category === 'region');
    if (regions.length > 0) {
      const f = regions[selectedFeatureIdx % regions.length];
      // Normalize lon to -180..180
      let flon = f.lon; if (flon > 180) flon -= 360;
      // Use diameter to determine zoom (Moon: 1°≈30.3km, Mars: 1°≈59.2km)
      const kmPerDeg = currentBody === 'luna' ? 30.3 : 59.2;
      const radiusDeg = (f.diameter / 2) / kmPerDeg;
      // Target span similar to US state view (~8-12°), scale up for large features
      const latSpan = Math.max(radiusDeg * 3, 8);
      // Clamp lon span to same as lat span (don't blow up near poles)
      const lonSpan = latSpan;
      return {
        lonMin: flon - lonSpan, lonMax: flon + lonSpan,
        latMin: Math.max(-90, f.lat - latSpan), latMax: Math.min(90, f.lat + latSpan)
      };
    }
    return { lonMin: -180, lonMax: 180, latMin: -90, latMax: 90 };
  }
  const active = STATE_MAP[CFG.state];
  if (!active) return { lonMin:-130, lonMax:-63, latMin:22, latMax:52 };

  // Bounding box of ONLY the active state
  let lonMin=999, lonMax=-999, latMin=999, latMax=-999;
  active.p.forEach(ring => ring.forEach(([lon,lat]) => {
    lonMin = Math.min(lonMin, lon); lonMax = Math.max(lonMax, lon);
    latMin = Math.min(latMin, lat); latMax = Math.max(latMax, lat);
  }));

  // Small padding (5%) so state isn't jammed to edges
  const lonPad = (lonMax - lonMin) * 0.05;
  const latPad = (latMax - latMin) * 0.05;
  return {
    lonMin: lonMin - lonPad, lonMax: lonMax + lonPad,
    latMin: latMin - latPad, latMax: latMax + latPad
  };
}

let viewBounds = getViewBounds();

function projectPoint(lon, lat) {
  const b = viewBounds;
  const geoW = b.lonMax - b.lonMin;
  const geoH = b.latMax - b.latMin;
  const geoAspect = geoW / geoH;
  const canvasAspect = MW / MH;
  let mapW, mapH, mapX, mapY;
  if (geoAspect > canvasAspect) {
    mapW = MW * 0.95; mapH = mapW / geoAspect;
    mapX = (MW - mapW) / 2; mapY = (MH - mapH) / 2;
  } else {
    mapH = MH * 0.95; mapW = mapH * geoAspect;
    mapX = (MW - mapW) / 2; mapY = (MH - mapH) / 2;
  }
  return [
    mapX + ((lon - b.lonMin) / geoW) * mapW,
    mapY + ((b.latMax - lat) / geoH) * mapH
  ];
}

function beaconXY() { return projectPoint(CFG.lon, CFG.lat); }

let animT = 0, pulseT = 0;

// ── Celestial body flat map (replaces state map for Moon/Mars) ──
function drawCelestialMap() {
  const features = getCelestialFeatures();
  const regions = features.filter(f => f.category === 'region');
  const landmarks = features.filter(f => f.category === 'landmark');
  const craters = features.filter(f => f.category === 'crater');
  const isMars = currentBody === 'mars';
  const accentR = isMars ? 255 : 128;
  const accentG = isMars ? 96 : 144;
  const accentB = isMars ? 48 : 160;
  const accent = `rgba(${accentR},${accentG},${accentB}`;

  // Grid lines
  ctx.strokeStyle = `${accent},0.08)`; ctx.lineWidth = 0.5;
  for (let lat = -80; lat <= 80; lat += 20) {
    const [x1,y1] = projectPoint(-180, lat);
    const [x2,y2] = projectPoint(180, lat);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  for (let lon = -160; lon <= 160; lon += 40) {
    const [x1,y1] = projectPoint(lon, -90);
    const [x2,y2] = projectPoint(lon, 90);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // Draw region boundaries
  if (currentBody === 'luna' && typeof LUNA_MARE_BOUNDARIES !== 'undefined') {
    // Mare boundaries — bright like Earth continent outlines
    ctx.strokeStyle = 'rgba(128,144,160,0.6)'; ctx.lineWidth = 1.2;
    LUNA_MARE_BOUNDARIES.forEach(mare => {
      mare.polys.forEach(ring => {
        if (ring.length < 3) return;
        const pts = ring.map(([lon,lat]) => projectPoint(lon, lat));
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.fillStyle = 'rgba(40,60,80,0.12)';
        ctx.fill(); ctx.stroke();
      });
    });
  }
  if (currentBody === 'mars' && typeof MARS_GEOLOGY !== 'undefined') {
    MARS_GEOLOGY.forEach(u => {
      u.polys.forEach(ring => {
        if (ring.length < 3) return;
        const pts = ring.map(([lon,lat]) => projectPoint(lon, lat));
        // Skip polys entirely outside canvas
        const xmin = Math.min(...pts.map(p=>p[0])), xmax = Math.max(...pts.map(p=>p[0]));
        const ymin = Math.min(...pts.map(p=>p[1])), ymax = Math.max(...pts.map(p=>p[1]));
        if (xmax < -50 || xmin > MW+50 || ymax < -50 || ymin > MH+50) return;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.fillStyle = `rgba(${accentR},${accentG},${accentB},0.04)`;
        ctx.strokeStyle = `${accent},0.5)`;
        ctx.lineWidth = 0.8;
        ctx.fill(); ctx.stroke();
      });
    });
  }

  // Draw features as beacons — only render those within view bounds
  const b = viewBounds;
  const inView = (lon, lat) => lon >= b.lonMin && lon <= b.lonMax && lat >= b.latMin && lat <= b.latMax;
  const selectedRegions = regions;
  const selIdx = selectedFeatureIdx % Math.max(selectedRegions.length, 1);

  regions.forEach((f, i) => {
    const flon = normLon(f.lon);
    if (!inView(flon, f.lat) && i !== selIdx) return;
    const [x, y] = projectPoint(flon, f.lat);
    const isSel = (i === selIdx);
    const r = isSel ? 6 : 3;
    const a = isSel ? 0.8 : 0.25;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = `${accent},${a})`;
    ctx.fill();
    if (isSel) {
      ctx.beginPath(); ctx.arc(x, y, 12 + Math.sin(pulseT) * 4, 0, Math.PI*2);
      ctx.strokeStyle = `${accent},0.4)`; ctx.lineWidth = 1; ctx.stroke();
      ctx.font = '600 9px Orbitron, sans-serif';
      ctx.fillStyle = `${accent},0.9)`;
      ctx.fillText(f.name.toUpperCase(), x + 14, y + 3);
    }
  });

  // Landmarks — only those in view, limit to ~30 max
  const viewLandmarks = landmarks.filter(f => inView(normLon(f.lon), f.lat)).slice(0, 30);
  viewLandmarks.forEach(f => {
    const [x, y] = projectPoint(normLon(f.lon), f.lat);
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fillStyle = `${accent},0.35)`;
    ctx.fill();
    ctx.font = '500 7px "Share Tech Mono", monospace';
    ctx.fillStyle = `${accent},0.25)`;
    ctx.fillText(f.name, x + 5, y + 2);
  });

  // Craters — only in view, proportional rings
  const viewCraters = craters.filter(f => inView(normLon(f.lon), f.lat)).slice(0, 40);
  const pixPerDeg = MW / (b.lonMax - b.lonMin);
  viewCraters.forEach(f => {
    const [x, y] = projectPoint(normLon(f.lon), f.lat);
    const kmPerDeg = currentBody === 'luna' ? 30.3 : 59.2;
    const craterDegRadius = (f.diameter / 2) / kmPerDeg;
    const craterPx = Math.max(craterDegRadius * pixPerDeg, 2);
    ctx.beginPath(); ctx.arc(x, y, craterPx, 0, Math.PI*2);
    ctx.strokeStyle = `${accent},0.15)`;
    ctx.lineWidth = 0.8; ctx.stroke();
    if (craterPx > 12) {
      ctx.font = '500 7px "Share Tech Mono", monospace';
      ctx.fillStyle = `${accent},0.2)`;
      ctx.fillText(f.name, x + craterPx + 3, y + 2);
    }
  });

  // Scan line
  const scanY = (animT * 30) % MH;
  if (isFinite(scanY)) {
    const sg = ctx.createLinearGradient(0, scanY-25, 0, scanY+25);
    sg.addColorStop(0, `${accent},0)`);
    sg.addColorStop(0.5, `${accent},0.025)`);
    sg.addColorStop(1, `${accent},0)`);
    ctx.fillStyle = sg; ctx.fillRect(0, scanY-25, MW, 50);
  }
}

function drawMap() {
  ctx.clearRect(0, 0, MW, MH);

  // Background gradient
  const bg = ctx.createRadialGradient(MW*0.4, MH*0.45, 0, MW*0.4, MH*0.45, MW*0.8);
  bg.addColorStop(0, '#061020'); bg.addColorStop(0.5, '#030a16'); bg.addColorStop(1, '#010408');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, MW, MH);

  animT += 0.016; pulseT += 0.04;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if (currentBody !== 'earth') {
    drawCelestialMap();
    requestAnimationFrame(drawMap);
    return;
  }

  const activeAbbr = CFG.state;
  const active = STATE_MAP[activeAbbr];
  const neighborSet = active ? new Set(active.n) : new Set();

  // Faint grid
  const b = viewBounds;
  ctx.strokeStyle = 'rgba(0,229,255,0.02)'; ctx.lineWidth = 0.5;
  for (let lat = Math.floor(b.latMin); lat <= Math.ceil(b.latMax); lat++) {
    const [x1,y1] = projectPoint(b.lonMin, lat);
    const [x2,y2] = projectPoint(b.lonMax, lat);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  for (let lon = Math.floor(b.lonMin); lon <= Math.ceil(b.lonMax); lon++) {
    const [x1,y1] = projectPoint(lon, b.latMin);
    const [x2,y2] = projectPoint(lon, b.latMax);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // ── Draw states: active bright, neighbors faded, others hidden ──
  STATES_DATA.forEach(s => {
    const isActive = s.a === activeAbbr;
    const isNeighbor = neighborSet.has(s.a);
    if (!isActive && !isNeighbor) return;

    const fillAlpha = isActive ? 0.05 : 0.01;
    const strokeAlpha = isActive ? 0.5 : 0.08;
    const glowAlpha = isActive ? 0.7 : 0;
    const nodeAlpha = isActive ? 0.5 : 0.1;
    const lw = isActive ? 1.6 : 0.5;

    s.p.forEach(ring => {
      if (ring.length < 4) return;
      const pts = ring.map(([lon,lat]) => projectPoint(lon, lat));

      // Fill
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fillStyle = `rgba(0,229,255,${fillAlpha})`;
      ctx.fill();

      // Glow (active only)
      if (isActive) {
        ctx.shadowColor = `rgba(0,229,255,${glowAlpha})`;
        ctx.shadowBlur = 12;
      }

      // Border stroke
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.strokeStyle = `rgba(0,229,255,${strokeAlpha})`;
      ctx.lineWidth = lw;
      ctx.stroke();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      // Crisp inner line for active
      if (isActive) {
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.strokeStyle = `rgba(0,229,255,${strokeAlpha * 1.4})`;
        ctx.lineWidth = lw * 0.7;
        ctx.stroke();
      }

      // Vertex nodes (active only)
      if (isActive) {
        ring.forEach(([lon, lat]) => {
          const [x,y] = projectPoint(lon, lat);
          ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,229,255,${nodeAlpha})`;
          ctx.fill();
        });
      }
    });
  });

  // Network lines between visible centers
  const visible = STATES_DATA.filter(s => s.a === activeAbbr || neighborSet.has(s.a));
  ctx.strokeStyle = 'rgba(0,229,255,0.03)'; ctx.lineWidth = 0.5;
  for (let i=0; i<visible.length; i++) {
    for (let j=i+1; j<visible.length; j++) {
      const [x1,y1] = projectPoint(visible[i].c[0], visible[i].c[1]);
      const [x2,y2] = projectPoint(visible[j].c[0], visible[j].c[1]);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
  }

  // ── Lakes (major bodies of water) ──
  if (typeof LAKES_DATA !== 'undefined') {
    const b = viewBounds;
    LAKES_DATA.forEach(lake => {
      lake.p.forEach(ring => {
        let inView = false;
        for (const [lon, lat] of ring) {
          if (lon >= b.lonMin && lon <= b.lonMax && lat >= b.latMin && lat <= b.latMax) {
            inView = true; break;
          }
        }
        if (!inView) return;

        const pts = ring.map(([lon, lat]) => projectPoint(lon, lat));
        if (pts.length < 3) return;

        function tracePath() {
          ctx.beginPath();
          ctx.moveTo(pts[0][0], pts[0][1]);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
          ctx.closePath();
        }

        // Dark water fill
        tracePath();
        ctx.fillStyle = 'rgba(0, 8, 24, 0.7)';
        ctx.fill();

        // Glow border (matches active state)
        ctx.shadowColor = 'rgba(0,229,255,0.7)';
        ctx.shadowBlur = 12;
        tracePath();
        ctx.strokeStyle = 'rgba(0,229,255,0.5)';
        ctx.lineWidth = 1.6;
        ctx.stroke();
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

        // Crisp inner line
        tracePath();
        ctx.strokeStyle = 'rgba(0,229,255,0.7)';
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // Vertex nodes
        ring.forEach(([lon, lat]) => {
          const [x, y] = projectPoint(lon, lat);
          ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,229,255,0.5)';
          ctx.fill();
        });
      });
    });
  }

  // ── Location Beacon ──
  const [lx,ly] = beaconXY();
  const pr = 10 + Math.sin(pulseT) * 5;
  const pa = 0.45 + Math.sin(pulseT) * 0.2;
  ctx.beginPath(); ctx.arc(lx,ly,pr*3,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.1})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly,pr*2,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.2})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly,pr*1.2,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,229,255,${pa*0.35})`; ctx.lineWidth=1.5; ctx.stroke();
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,pr);
  lg.addColorStop(0,`rgba(0,229,255,${pa})`);
  lg.addColorStop(0.5,`rgba(0,229,255,${pa*0.3})`);
  lg.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle=lg; ctx.fillRect(lx-pr,ly-pr,pr*2,pr*2);
  ctx.shadowColor='rgba(0,229,255,0.9)'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2);
  ctx.fillStyle='#00e5ff'; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;

  // ── Leader line: beacon → weather panel top-left corner ──
  const wp = document.getElementById('weatherPanel');
  if (wp) {
    const wpRect = wp.getBoundingClientRect();
    const mapRect = canvas.getBoundingClientRect();
    // Target: top-left corner of weather panel, relative to map canvas
    const tx = wpRect.left - mapRect.left;
    const ty = wpRect.top - mapRect.top;

    // Only draw if target is within or near the map canvas
    if (tx < MW + 200) {
      // Leader line with glow
      ctx.shadowColor = 'rgba(0,229,255,0.7)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      const elbowX = MW - 10;
      ctx.lineTo(elbowX, ly);
      ctx.lineTo(tx, ty);
      ctx.strokeStyle = 'rgba(0,229,255,0.5)';
      ctx.lineWidth = 1.6;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      // Crisp inner line
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(elbowX, ly);
      ctx.lineTo(tx, ty);
      ctx.strokeStyle = 'rgba(0,229,255,0.7)';
      ctx.lineWidth = 1.1;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Ring at beacon end
      ctx.beginPath(); ctx.arc(lx, ly, 8, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,229,255,0.3)'; ctx.lineWidth = 1;
      ctx.stroke();

      // Dot at panel corner
      ctx.beginPath(); ctx.arc(tx, ty, 3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,229,255,0.6)'; ctx.fill();
    }
  }

  // Scan line
  const scanY = (animT * 30) % MH;
  const sg = ctx.createLinearGradient(0, scanY-25, 0, scanY+25);
  sg.addColorStop(0,'rgba(0,229,255,0)');
  sg.addColorStop(0.5,'rgba(0,229,255,0.025)');
  sg.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle = sg; ctx.fillRect(0, scanY-25, MW, 50);

  requestAnimationFrame(drawMap);
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS GLOBE — Wireframe + Continent Outlines
// ═══════════════════════════════════════════════════════════════
let globe = {};

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function initGlobe() {
  const container = document.getElementById('globeContainer');
  const gc = document.getElementById('globeCanvas');
  const gw = container.clientWidth, gh = container.clientHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, gw/gh, 0.1, 1000);
  camera.position.z = 2.8;

  const renderer = new THREE.WebGLRenderer({ canvas: gc, alpha: false, antialias: true });
  renderer.setSize(gw, gh);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x010408, 1);

  globe = { scene, camera, renderer, globeGroup: null, locDot: null, updateLocDot: function(){} };

  // Build body-specific content
  rebuildGlobe();

  function animateGlobe() {
    requestAnimationFrame(animateGlobe);
    if (globe.globeGroup) {} // globe frozen on selected region
    if (globe.locDot) {
      const s = 1 + Math.sin(Date.now() * 0.003) * 0.3;
      globe.locDot.scale.set(s, s, s);
      globe.locDot.material.opacity = 0.6 + Math.sin(Date.now() * 0.004) * 0.3;
    }
    renderer.render(scene, camera);
  }
  animateGlobe();
}

function resizeGlobe() {
  if (!globe.renderer) return;
  const c = document.getElementById('globeContainer');
  const gw = c.clientWidth, gh = c.clientHeight;
  globe.camera.aspect = gw / gh;
  globe.camera.updateProjectionMatrix();
  globe.renderer.setSize(gw, gh);
}

// ═══════════════════════════════════════════════════════════════
//  POLAR GLOBE — replaces flat map for high-latitude views
// ═══════════════════════════════════════════════════════════════
const POLAR_THRESHOLD = 70; // degrees latitude
let polarGlobe = { scene: null, camera: null, renderer: null, group: null, active: false };

function initPolarGlobe() {
  const container = document.getElementById('polarGlobeContainer');
  const gc = document.getElementById('polarGlobeCanvas');
  const gw = container.clientWidth || 800, gh = container.clientHeight || 600;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(30, gw/gh, 0.1, 1000);
  camera.position.set(0, 0, 1.6);

  const renderer = new THREE.WebGLRenderer({ canvas: gc, alpha: false, antialias: true });
  renderer.setSize(gw, gh);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x010408, 1);

  polarGlobe = { scene, camera, renderer, group: null, active: false, animId: null };
}

function rebuildPolarGlobe(lat, lon) {
  if (!polarGlobe.scene) initPolarGlobe();
  const { scene, camera, renderer } = polarGlobe;

  // Remove old group
  if (polarGlobe.group) scene.remove(polarGlobe.group);
  const g = new THREE.Group();
  scene.add(g);
  polarGlobe.group = g;

  const isMars = currentBody === 'mars';
  const isLuna = currentBody === 'luna';
  const colors = {
    luna:  { wire: 0x8090a0, inner: 0x080808, line: 0x8090a0 },
    mars:  { wire: 0xff6030, inner: 0x0a0404, line: 0xff6030 },
  };
  const c = colors[currentBody] || colors.luna;

  // Opaque inner sphere
  g.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.995, 64, 48),
    new THREE.MeshBasicMaterial({ color: c.inner })
  ));

  // Wireframe sphere — denser for detail
  g.add(new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 48),
    new THREE.MeshBasicMaterial({ color: c.wire, wireframe: true, transparent: true, opacity: 0.06 })
  ));

  // Latitude/longitude grid rings every 5° near poles
  const gridMat = new THREE.LineBasicMaterial({ color: c.wire, transparent: true, opacity: 0.1 });
  for (let glat = -85; glat <= 85; glat += 5) {
    const pts = [];
    for (let glon = -180; glon <= 180; glon += 5) {
      pts.push(latLonToVec3(glat, glon, 1.003));
    }
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
  for (let glon = -180; glon < 180; glon += 15) {
    const pts = [];
    for (let glat = -90; glat <= 90; glat += 2) {
      pts.push(latLonToVec3(glat, glon, 1.003));
    }
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }

  // Body-specific outlines
  const lineMat = new THREE.LineBasicMaterial({ color: c.line, transparent: true, opacity: 0.5 });

  if (isLuna && typeof LUNA_MARE_BOUNDARIES !== 'undefined') {
    LUNA_MARE_BOUNDARIES.forEach(mare => {
      mare.polys.forEach(ring => {
        if (ring.length < 3) return;
        const points = ring.map(([lo, la]) => latLonToVec3(la, lo, 1.005));
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lineMat));
      });
    });
  }
  if (isMars && typeof MARS_GEOLOGY !== 'undefined') {
    MARS_GEOLOGY.forEach(unit => {
      unit.polys.forEach(ring => {
        if (ring.length < 3) return;
        const points = ring.map(([lo, la]) => latLonToVec3(la, lo, 1.005));
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lineMat));
      });
    });
  }

  // Location dot
  const locDotGeo = new THREE.SphereGeometry(0.02, 8, 8);
  const locDotMat = new THREE.MeshBasicMaterial({ color: c.line });
  const locDot = new THREE.Mesh(locDotGeo, locDotMat);
  locDot.position.copy(latLonToVec3(lat, lon, 1.02));
  g.add(locDot);
  polarGlobe.locDot = locDot;

  // Orient globe: rotate so target lat/lon faces camera (looking down at pole)
  // Convert lat/lon to unit vector, then orient globe so that vector points at camera (0,0,1)
  const target = latLonToVec3(lat, lon, 1);
  const up = new THREE.Vector3(0, 1, 0);

  // Use lookAt-style: we want the target point on the sphere surface to face the camera
  // Rotate group so target aligns with +Z axis
  const q = new THREE.Quaternion();
  q.setFromUnitVectors(target.clone().normalize(), new THREE.Vector3(0, 0, 1));
  g.quaternion.copy(q);

  renderer.setClearColor(c.inner, 1);

  // Start animation if not running
  if (!polarGlobe.active) {
    polarGlobe.active = true;
    function animPolar() {
      if (!polarGlobe.active) return;
      polarGlobe.animId = requestAnimationFrame(animPolar);
      // Slow rotation disabled — globe frozen on selected region
      // if (polarGlobe.group) {
      //   polarGlobe.group.rotateOnWorldAxis(target.clone().normalize(), 0.001);
      // }
      if (polarGlobe.locDot) {
        const s = 1 + Math.sin(Date.now() * 0.003) * 0.3;
        polarGlobe.locDot.scale.set(s, s, s);
      }
      renderer.render(scene, camera);
    }
    animPolar();
  }
}

function showPolarGlobe(lat, lon) {
  const container = document.getElementById('polarGlobeContainer');
  const mapCanvas = document.getElementById('mapCanvas');
  container.style.display = 'block';
  mapCanvas.style.display = 'none';
  rebuildPolarGlobe(lat, lon);
  resizePolarGlobe();
}

function hidePolarGlobe() {
  const container = document.getElementById('polarGlobeContainer');
  const mapCanvas = document.getElementById('mapCanvas');
  container.style.display = 'none';
  mapCanvas.style.display = 'block';
  polarGlobe.active = false;
  if (polarGlobe.animId) cancelAnimationFrame(polarGlobe.animId);
  // Re-measure canvas after showing it again
  MW = mapCanvas.width = mapCanvas.clientWidth;
  MH = mapCanvas.height = mapCanvas.clientHeight;
  viewBounds = getViewBounds();
}

function resizePolarGlobe() {
  if (!polarGlobe.renderer) return;
  const c = document.getElementById('polarGlobeContainer');
  const gw = c.clientWidth, gh = c.clientHeight;
  if (gw === 0 || gh === 0) return;
  polarGlobe.camera.aspect = gw / gh;
  polarGlobe.camera.updateProjectionMatrix();
  polarGlobe.renderer.setSize(gw, gh);
}

function isPolarView() {
  if (currentBody === 'earth') return false;
  const features = getCelestialFeatures();
  const regions = features.filter(f => f.category === 'region');
  if (regions.length === 0) return false;
  const f = regions[selectedFeatureIdx % regions.length];
  return Math.abs(f.lat) > POLAR_THRESHOLD;
}

// ═══════════════════════════════════════════════════════════════
//  MULTI-BODY SUPPORT — switchBody() rebuilds globe + weather panel
// ═══════════════════════════════════════════════════════════════

function switchBody(body) {
  if (body === currentBody) return;
  currentBody = body;

  // Update selector UI
  document.querySelectorAll('.body-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.body === body);
  });

  // Update HUD system label
  const labels = { earth: 'Marchog Planetary Surface Monitor', luna: 'Marchog Lunar Surface Monitor', mars: 'Marchog Martian Surface Monitor' };
  document.querySelector('.hud-system').textContent = labels[body] || labels.earth;

  // Rebuild globe with new body data
  rebuildGlobe();

  // Update weather panel
  if (body === 'earth') {
    hidePolarGlobe();
    fetchWeather();
  } else {
    showCelestialWeather();
  }

  // Redraw map (Earth shows state map, others show feature map)
  viewBounds = getViewBounds();
  resizeCanvas();
}

// ── Celestial body feature selection ──
let selectedFeatureIdx = 0;

// Normalize longitude to -180..180 (Moon data uses 0..360)
function normLon(lon) { return lon > 180 ? lon - 360 : lon; }

function getCelestialFeatures() {
  if (currentBody === 'luna') return typeof LUNA_FEATURES !== 'undefined' ? LUNA_FEATURES : [];
  if (currentBody === 'mars') return typeof MARS_FEATURES !== 'undefined' ? MARS_FEATURES : [];
  return [];
}

function getCelestialRef() {
  if (currentBody === 'luna') return typeof LUNA_REFERENCE !== 'undefined' ? LUNA_REFERENCE : null;
  if (currentBody === 'mars') return typeof MARS_REFERENCE !== 'undefined' ? MARS_REFERENCE : null;
  return null;
}

function showCelestialWeather() {
  const features = getCelestialFeatures();
  const ref = getCelestialRef();
  if (!features.length) return;

  // Pick a region feature by default
  const regions = features.filter(f => f.category === 'region');
  const feat = regions.length > 0 ? regions[selectedFeatureIdx % regions.length] : features[0];
  const e = feat.env;
  const bodyLabel = currentBody === 'luna' ? 'LUNA' : 'MARS';

  document.getElementById('locationName').textContent = feat.name.toUpperCase();
  const flon = normLon(feat.lon);
  document.getElementById('locationCoords').textContent =
    `${Math.abs(feat.lat).toFixed(2)}° ${feat.lat>=0?'N':'S'} / ${Math.abs(flon).toFixed(2)}° ${flon>=0?'E':'W'}  ·  ${feat.type}`;

  if (currentBody === 'luna') {
    // Luna weather display
    document.getElementById('tempValue').innerHTML =
      `${Math.round(e.surface_temp_c)}<span class="unit">°C</span>`;
    document.getElementById('conditionIcon').textContent = e.is_dayside ? '☀️' : '🌑';
    document.getElementById('conditionText').textContent =
      e.is_dayside ? 'LUNAR DAY' : 'LUNAR NIGHT';

    // Compute hours until next lunar day/night transition
    // Synodic period = 29.53 Earth days; sub-solar lon advances ~12.19°/day
    // phase_day 0 = new moon (sub-solar lon ~0°), advances eastward
    const SYNODIC = 29.53;
    const flon = normLon(feat.lon); // -180..180
    const subSolarLon = ((e.phase_day / SYNODIC) * 360) % 360; // 0..360
    // Angular distance from sub-solar point (how far past local noon)
    let angDist = ((subSolarLon - flon) % 360 + 360) % 360; // 0..360, 0=noon
    // Sunset at 90°, Sunrise at 270° (or -90°)
    let hoursToNight, hoursToDay;
    if (angDist < 180) {
      // Currently dayside: angDist 0..180 (noon→sunset→midnight approach)
      hoursToNight = ((180 - angDist) / 360) * SYNODIC * 24;
      hoursToDay = ((360 - angDist) / 360) * SYNODIC * 24;
    } else {
      // Currently nightside: angDist 180..360 (midnight→sunrise approach)
      hoursToDay = ((360 - angDist) / 360) * SYNODIC * 24;
      hoursToNight = ((180 + (360 - angDist)) / 360) * SYNODIC * 24;
    }
    const fmtHrs = (h) => {
      const days = Math.floor(h / 24);
      const hrs = Math.round(h % 24);
      return days > 0 ? `${days}d ${hrs}h` : `${hrs}h`;
    };
    const transitionInfo = e.is_dayside
      ? `☀ ${fmtHrs(hoursToNight)} to night  ·  🌑 ${fmtHrs(hoursToDay)} to dawn`
      : `🌑 ${fmtHrs(hoursToDay)} to dawn  ·  ☀ ${fmtHrs(hoursToNight)} to dusk`;

    document.getElementById('feelsLike').textContent = transitionInfo;

    document.getElementById('windValue').textContent = `${e.solar_wind_kms} km/s`;
    document.getElementById('windDir').textContent = 'Solar Wind';
    document.getElementById('humidity').textContent = `${e.radiation_msv_day} mSv/d`;
    document.getElementById('pressure').textContent = '~0 (vacuum)';
    document.getElementById('visibility').textContent = `${e.illumination_pct}% illum`;
    document.getElementById('cloudCover').textContent = `${e.static_charge_v}V`;

    // Relabel grid
    setGridLabels(['Solar Wind', 'Source', 'Radiation', 'Pressure', 'Illumination', 'Static Chg']);

    // Forecast strip: show nearby features
    showFeatureStrip(features, feat);

  } else if (currentBody === 'mars') {
    // Mars weather display
    document.getElementById('tempValue').innerHTML =
      `${Math.round(e.surface_temp_c)}<span class="unit">°C</span>`;
    document.getElementById('conditionIcon').textContent =
      e.dust_opacity_tau > 0.5 ? '🌫️' : (e.is_dayside ? '☀️' : '🌑');
    document.getElementById('conditionText').textContent =
      e.dust_opacity_tau > 0.7 ? 'DUST HAZE' : (e.is_dayside ? 'MARTIAN DAY' : 'MARTIAN NIGHT');
    document.getElementById('feelsLike').textContent =
      `Ls ${e.solar_longitude_ls}° · ${e.season_nh} · Sky: ${e.sky_color}${e.co2_frost ? ' · CO₂ FROST' : ''}`;

    document.getElementById('windValue').textContent = `${e.wind_speed_ms} m/s`;
    document.getElementById('windDir').textContent = e.wind_direction;
    document.getElementById('humidity').textContent = `${e.precip_water_um} μm`;
    document.getElementById('pressure').textContent = `${e.pressure_mbar} mbar`;
    document.getElementById('visibility').textContent = `τ ${e.dust_opacity_tau}`;
    document.getElementById('cloudCover').textContent = `${e.radiation_msv_day} mSv/d`;

    setGridLabels(['Wind', 'Direction', 'Pr. Water', 'Pressure', 'Dust Tau', 'Radiation']);
    showFeatureStrip(features, feat);
  }

  // Update globe location dot to selected feature
  if (globe.locDot) {
    globe.locDot.position.copy(latLonToVec3(feat.lat, normLon(feat.lon), 1.02));
  }
  // Rotate globe to face selected location
  if (globe.globeGroup) {
    const lonRad = -normLon(feat.lon) * Math.PI / 180 - Math.PI / 2;
    const latRad = feat.lat * Math.PI / 180;
    globe.globeGroup.rotation.set(latRad, lonRad, 0);
  }

  // Polar view: switch to zoomed 3D globe for high-latitude locations
  if (Math.abs(feat.lat) > POLAR_THRESHOLD) {
    showPolarGlobe(feat.lat, normLon(feat.lon));
  } else {
    hidePolarGlobe();
  }
}

function setGridLabels(labels) {
  const els = document.querySelectorAll('.wp-label');
  labels.forEach((l, i) => { if (els[i]) els[i].textContent = l; });
}

function showFeatureStrip(features, current) {
  const strip = document.getElementById('forecastStrip');
  const label = document.getElementById('forecastLabel');
  label.textContent = currentBody === 'luna' ? 'LUNAR REGIONS' : 'MARTIAN REGIONS';
  strip.innerHTML = '';
  // Show nearest 7 features of same category or regions
  const regions = features.filter(f => f.category === 'region');
  const show = regions.slice(0, 7);
  show.forEach(f => {
    const e = f.env;
    const temp = currentBody === 'luna' ? e.surface_temp_c : e.surface_temp_c;
    const icon = currentBody === 'luna'
      ? (e.is_dayside ? '☀️' : '🌑')
      : (e.dust_opacity_tau > 0.5 ? '🌫️' : (e.is_dayside ? '☀️' : '🌑'));
    const el = document.createElement('div');
    el.className = 'wp-forecast-day';
    el.style.cursor = 'pointer';
    el.innerHTML = `<div class="wp-forecast-day-name">${f.name.slice(0,6).toUpperCase()}</div>
      <div class="wp-forecast-day-icon">${icon}</div>
      <div class="wp-forecast-day-temp">${Math.round(temp)}°</div>
      <div class="wp-forecast-day-lo">${f.type}</div>`;
    el.onclick = () => {
      selectedFeatureIdx = features.indexOf(f);
      showCelestialWeather();
      viewBounds = getViewBounds();
    };
    strip.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
//  GLOBE REBUILD — switch between Earth / Luna / Mars outlines
// ═══════════════════════════════════════════════════════════════

function rebuildGlobe() {
  if (!globe.scene) return;
  const { scene, camera, renderer, globeGroup: oldGroup } = globe;

  // Remove old group
  if (oldGroup) scene.remove(oldGroup);

  const g = new THREE.Group();
  scene.add(g);

  // Body color schemes
  const colors = {
    earth: { wire: 0x00e5ff, inner: 0x010408, glow: 0x00e5ff, line: 0x00e5ff },
    luna:  { wire: 0x8090a0, inner: 0x080808, glow: 0x8090a0, line: 0x8090a0 },
    mars:  { wire: 0xff6030, inner: 0x0a0404, glow: 0xff6030, line: 0xff6030 },
  };
  const c = colors[currentBody] || colors.earth;

  // Opaque inner sphere — occludes far-side geometry
  const solidGeo = new THREE.SphereGeometry(0.995, 36, 24);
  const solidMat = new THREE.MeshBasicMaterial({ color: c.inner });
  g.add(new THREE.Mesh(solidGeo, solidMat));

  // Wireframe sphere
  const sphereGeo = new THREE.SphereGeometry(1, 36, 24);
  const sphereMat = new THREE.MeshBasicMaterial({
    color: c.wire, wireframe: true, transparent: true, opacity: 0.08
  });
  g.add(new THREE.Mesh(sphereGeo, sphereMat));

  // Equator ring
  const ringGeo = new THREE.RingGeometry(1.002, 1.004, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: c.wire, transparent: true, opacity: 0.25, side: THREE.DoubleSide
  });
  g.add(new THREE.Mesh(ringGeo, ringMat));

  // Outer glow
  const glowGeo = new THREE.SphereGeometry(1.06, 32, 20);
  const glowMat = new THREE.MeshBasicMaterial({
    color: c.glow, transparent: true, opacity: 0.05, side: THREE.BackSide
  });
  g.add(new THREE.Mesh(glowGeo, glowMat));

  // ── OUTLINES ── body-specific
  const lineMat = new THREE.LineBasicMaterial({
    color: c.line, transparent: true, opacity: 0.5
  });

  if (currentBody === 'earth') {
    // Continent outlines from LAND_DATA
    LAND_DATA.forEach(ring => {
      if (ring.length < 3) return;
      const points = ring.map(([lon, lat]) => latLonToVec3(lat, lon, 1.005));
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lineMat));
    });

  } else if (currentBody === 'luna') {
    // Mare boundaries
    if (typeof LUNA_MARE_BOUNDARIES !== 'undefined') {
      const mareMat = new THREE.LineBasicMaterial({ color: 0x8090a0, transparent: true, opacity: 0.6 });
      LUNA_MARE_BOUNDARIES.forEach(mare => {
        mare.polys.forEach(ring => {
          if (ring.length < 3) return;
          const points = ring.map(([lon, lat]) => latLonToVec3(lat, lon, 1.005));
          g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), mareMat));
        });
      });
    }
    // Terrain region fills (subtle)
    if (typeof LUNA_REGIONS !== 'undefined') {
      LUNA_REGIONS.forEach(region => {
        const rMat = new THREE.LineBasicMaterial({
          color: new THREE.Color(region.color), transparent: true, opacity: region.opacity * 0.5
        });
        region.polys.forEach(ring => {
          if (ring.length < 3) return;
          const points = ring.map(([lon, lat]) => latLonToVec3(lat, lon, 1.003));
          g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), rMat));
        });
      });
    }

  } else if (currentBody === 'mars') {
    // Mars USGS geologic unit boundaries (SIM 3292)
    if (typeof MARS_GEOLOGY !== 'undefined') {
      const rMat = new THREE.LineBasicMaterial({ color: 0xff6030, transparent: true, opacity: 0.35 });
      MARS_GEOLOGY.forEach(unit => {
        unit.polys.forEach(ring => {
          if (ring.length < 3) return;
          const points = ring.map(([lon, lat]) => latLonToVec3(lat, lon, 1.005));
          g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), rMat));
        });
      });
    }
  }

  // Location dot
  const locDotGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const locDotMat = new THREE.MeshBasicMaterial({ color: c.line });
  const locDot = new THREE.Mesh(locDotGeo, locDotMat);
  g.add(locDot);

  // Position dot
  if (currentBody === 'earth') {
    locDot.position.copy(latLonToVec3(CFG.lat, CFG.lon, 1.02));
  } else {
    const features = getCelestialFeatures();
    const regions = features.filter(f => f.category === 'region');
    if (regions.length > 0) {
      const f = regions[selectedFeatureIdx % regions.length];
      locDot.position.copy(latLonToVec3(f.lat, normLon(f.lon), 1.02));
    }
  }

  // Update globe refs
  globe.globeGroup = g;
  globe.locDot = locDot;
  globe.updateLocDot = function() {
    if (currentBody === 'earth') {
      locDot.position.copy(latLonToVec3(CFG.lat, CFG.lon, 1.02));
    }
  };

  // Orient globe to face selected location
  if (currentBody === 'earth') {
    const lonRad = -CFG.lon * Math.PI / 180 - Math.PI / 2;
    const latRad = CFG.lat * Math.PI / 180;
    g.rotation.set(latRad, lonRad, 0);
  } else {
    const features = getCelestialFeatures();
    const regions = features.filter(f => f.category === 'region');
    if (regions.length > 0) {
      const f = regions[selectedFeatureIdx % regions.length];
      const lonRad = -normLon(f.lon) * Math.PI / 180 - Math.PI / 2;
      const latRad = f.lat * Math.PI / 180;
      g.rotation.set(latRad, lonRad, 0);
    }
  }

  // Update renderer background
  renderer.setClearColor(c.inner, 1);
}

// ═══════════════════════════════════════════════════════════════
//  HUD POSITIONING + WEATHER DATA + CLOCK + SETTINGS + INIT
// ═══════════════════════════════════════════════════════════════

function resizeCanvas() {
  const el = document.getElementById('mapCanvas');
  MW = el.width = el.clientWidth;
  MH = el.height = el.clientHeight;
  viewBounds = getViewBounds();
  resizeGlobe();
  if (polarGlobe.active) resizePolarGlobe();
}

async function fetchWeather() {
  const tu = CFG.units === 'celsius' ? 'celsius' : 'fahrenheit';
  const wu = CFG.units === 'celsius' ? 'kmh' : 'mph';
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m,visibility`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
    + `&temperature_unit=${tu}&wind_speed_unit=${wu}&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url); const data = await r.json(); updateUI(data);
  } catch(e) { console.error('[weather]', e); }
}

function updateUI(data) {
  const c = data.current;
  const us = CFG.units === 'celsius' ? '°C' : '°F';
  const ws = CFG.units === 'celsius' ? 'km/h' : 'mph';
  document.getElementById('locationName').textContent = CFG.name;
  document.getElementById('locationCoords').textContent =
    `${Math.abs(CFG.lat).toFixed(4)}° ${CFG.lat>=0?'N':'S'} / ${Math.abs(CFG.lon).toFixed(4)}° ${CFG.lon>=0?'E':'W'}`;
  document.getElementById('tempValue').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">${us}</span>`;
  const wmo = WMO_CODES[c.weather_code] || {d:'Unknown',i:'❓'};
  document.getElementById('conditionIcon').textContent = wmo.i;
  document.getElementById('conditionText').textContent = wmo.d.toUpperCase();
  document.getElementById('feelsLike').textContent = `Feels like ${Math.round(c.apparent_temperature)}${us}`;
  document.getElementById('windValue').textContent = `${Math.round(c.wind_speed_10m)} ${ws}`;
  document.getElementById('windDir').textContent = degToCompass(c.wind_direction_10m);
  document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
  document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
  document.getElementById('visibility').textContent = c.visibility ? `${(c.visibility/1000).toFixed(1)} km` : '---';
  document.getElementById('cloudCover').textContent = `${c.cloud_cover}%`;
  setGridLabels(['Wind', 'Direction', 'Humidity', 'Pressure', 'Visibility', 'Clouds']);

  if (data.daily) {
    const strip = document.getElementById('forecastStrip');
    const label = document.getElementById('forecastLabel');
    label.textContent = '7-DAY FORECAST';
    strip.innerHTML = '';
    const d = data.daily;
    for (let i = 0; i < d.time.length; i++) {
      const date = new Date(d.time[i] + 'T12:00:00');
      const dayName = i === 0 ? 'TODAY' : DAYS[date.getDay()];
      const fwmo = WMO_CODES[d.weather_code[i]] || {i:'❓'};
      const el = document.createElement('div');
      el.className = 'wp-forecast-day';
      el.innerHTML = `<div class="wp-forecast-day-name">${dayName}</div>
        <div class="wp-forecast-day-icon">${fwmo.i}</div>
        <div class="wp-forecast-day-temp">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="wp-forecast-day-lo">${Math.round(d.temperature_2m_min[i])}°</div>`;
      strip.appendChild(el);
    }
  }
}

function degToCompass(deg) {
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16] + ` ${Math.round(deg)}°`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clockDate').textContent = now.toISOString().slice(0,10);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('setLocationName').value = CFG.name;
  document.getElementById('setLat').value = CFG.lat;
  document.getElementById('setLon').value = CFG.lon;
  document.getElementById('setState').value = CFG.state;
  document.getElementById('setUnits').value = CFG.units;
}

function applySettings() {
  const n = document.getElementById('setLocationName').value.trim();
  const lat = parseFloat(document.getElementById('setLat').value);
  const lon = parseFloat(document.getElementById('setLon').value);
  const st = document.getElementById('setState').value.trim().toUpperCase();
  if (n) CFG.name = n.toUpperCase();
  if (!isNaN(lat)) CFG.lat = lat;
  if (!isNaN(lon)) CFG.lon = lon;
  if (st && st.length === 2) CFG.state = st;
  CFG.units = document.getElementById('setUnits').value;
  document.getElementById('settingsPanel').classList.remove('open');
  viewBounds = getViewBounds();
  resizeCanvas();
  fetchWeather();
  if (globe.updateLocDot) globe.updateLocDot();
}

window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.type === 'weatherConfig' || msg.type === 'configure') {
    if (msg.lat) CFG.lat = parseFloat(msg.lat);
    if (msg.lon) CFG.lon = parseFloat(msg.lon);
    if (msg.name) CFG.name = msg.name.toUpperCase();
    if (msg.state) CFG.state = msg.state.toUpperCase();
    if (msg.units) CFG.units = msg.units;
    viewBounds = getViewBounds();
    resizeCanvas(); fetchWeather();
    if (globe.updateLocDot) globe.updateLocDot();
  }
});

// ── INIT ──
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
requestAnimationFrame(drawMap);
initGlobe();
updateClock(); setInterval(updateClock, 1000);
fetchWeather(); setInterval(fetchWeather, CFG.refreshInterval);

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight'].includes(e.key))
    window.parent.postMessage({type:'keydown', key:e.key}, '*');
});
window.parent.postMessage({type:'pageReady', page:'weather'}, '*');
</script>
