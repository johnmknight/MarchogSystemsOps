<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marchog Systems — Weather</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan: #00e5ff;
      --cyan-bright: #40efff;
      --cyan-dim: rgba(0, 229, 255, 0.35);
      --teal: #00bfa5;
      --orange: #ff9100;
      --red: #ff3d00;
      --white: #e8f0ff;
      --white-bright: #ffffff;
      --text-primary: #e8f0ff;
      --text-secondary: #a0c0e0;
      --bg-dark: #020a14;
      --bg-panel: rgba(4, 16, 32, 0.82);
      --border-glow: rgba(0, 229, 255, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-primary);
    }

    /* ── Layout: left map, right globe ── */
    #mapCanvas {
      position: absolute; top: 0; left: 0;
      width: 65%; height: 100%;
      z-index: 1;
    }
    #globeContainer {
      position: absolute; top: 0; right: 0;
      width: 35%; height: 55%;
      z-index: 1;
      border-left: 1px solid rgba(0, 229, 255, 0.06);
      border-bottom: 1px solid rgba(0, 229, 255, 0.06);
      background: radial-gradient(ellipse at center, #061020 0%, #010408 100%);
    }
    #globeCanvas {
      width: 100%; height: 100%;
      display: block;
    }

    /* ── HUD Layer ── */
    #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .hud-system {
      position: absolute; top: 10px; left: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5em; font-weight: 500;
      letter-spacing: 0.2em; color: var(--cyan); opacity: 0.5;
      text-transform: uppercase;
    }
    .hud-clock {
      position: absolute; top: 10px; right: 14px;
      text-align: right;
    }
    .hud-clock-time {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1em, 2vw, 1.5em);
      font-weight: 700; color: var(--white-bright);
      letter-spacing: 0.06em;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.25);
    }
    .hud-clock-date {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65em; color: var(--cyan-bright);
    }

    /* ── Location Name (top-left, above map) ── */
    .hud-location {
      position: absolute; top: 30px; left: 14px;
    }
    .hud-location-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4em, 3vw, 2.4em);
      font-weight: 800; letter-spacing: 0.04em;
      color: var(--white-bright);
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.4), 0 0 40px rgba(0, 229, 255, 0.15);
      line-height: 1.1;
    }
    .hud-location-coords {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72em; color: var(--cyan-bright);
      letter-spacing: 0.06em; margin-top: 2px;
    }

    /* ── Weather Callout (overlaid on state map near beacon) ── */
    .hud-callout {
      position: absolute;
      pointer-events: auto;
    }
    .callout-inner {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      min-width: 160px;
    }
    .callout-inner::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }
    .callout-temp {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2em, 4vw, 3.2em);
      font-weight: 900; color: var(--white-bright);
      line-height: 1;
      text-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }
    .callout-temp .unit {
      font-size: 0.35em; font-weight: 500;
      color: var(--cyan-bright); vertical-align: super;
    }
    .callout-condition-row {
      display: flex; align-items: center; gap: 6px; margin-top: 4px;
    }
    .callout-condition-icon { font-size: 1.3em; }
    .callout-condition-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; font-weight: 600;
      color: var(--white); letter-spacing: 0.08em;
    }
    .callout-feels {
      font-size: 0.68em; color: var(--text-secondary);
      margin-top: 3px;
    }
    .callout-divider {
      height: 1px; margin: 7px 0;
      background: linear-gradient(90deg, var(--cyan-dim), transparent);
    }
    .callout-row {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-top: 3px;
    }
    .callout-label {
      font-size: 0.62em; color: var(--text-secondary);
    }
    .callout-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72em; font-weight: 600;
      color: var(--white-bright);
    }

    /* ── Globe Label ── */
    .globe-label {
      position: absolute; right: 14px;
      top: calc(55% + 4px);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.42em; font-weight: 500;
      letter-spacing: 0.15em; color: var(--cyan); opacity: 0.4;
      text-transform: uppercase;
      text-align: right;
      width: 35%;
    }

    /* ── Forecast Strip (bottom, full width) ── */
    .hud-forecast {
      position: absolute; bottom: 10px;
      left: 50%; transform: translateX(-50%);
      pointer-events: auto;
    }
    .forecast-strip {
      display: flex; gap: 3px;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 4px;
      padding: 6px 10px;
      backdrop-filter: blur(8px);
    }
    .forecast-day {
      text-align: center; padding: 3px 8px; min-width: 52px;
      border-right: 1px solid rgba(0, 229, 255, 0.06);
    }
    .forecast-day:last-child { border-right: none; }
    .forecast-day-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.45em; font-weight: 600;
      color: var(--cyan); letter-spacing: 0.1em;
    }
    .forecast-day-icon { font-size: 1.1em; margin: 1px 0; }
    .forecast-day-temp {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72em; color: var(--white-bright);
    }
    .forecast-day-lo { font-size: 0.58em; color: var(--text-secondary); }

    /* ── Settings ── */
    #settingsToggle {
      position: absolute; top: 10px; right: 120px; z-index: 100;
      width: 28px; height: 28px;
      background: rgba(4, 16, 32, 0.5);
      border: 1px solid var(--border-glow); border-radius: 3px;
      color: var(--text-secondary); font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; opacity: 0; pointer-events: auto;
    }
    body:hover #settingsToggle { opacity: 1; }
    #settingsToggle:hover { color: var(--cyan); border-color: var(--cyan); }
    #settingsPanel {
      position: absolute; top: 44px; right: 14px; z-index: 100;
      width: 260px; background: var(--bg-panel);
      border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 14px; display: none;
      backdrop-filter: blur(12px); pointer-events: auto;
    }
    #settingsPanel.open { display: block; }
    .settings-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6em; font-weight: 600;
      letter-spacing: 0.12em; color: var(--cyan);
      margin-bottom: 10px; text-transform: uppercase;
    }
    .setting-group { margin-bottom: 10px; }
    .setting-group label {
      display: block; font-size: 0.65em;
      color: var(--text-secondary); margin-bottom: 3px;
    }
    .setting-group input, .setting-group select {
      width: 100%; background: rgba(4, 16, 32, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.15);
      color: var(--text-primary); font-family: 'Share Tech Mono', monospace;
      font-size: 0.75em; padding: 5px 8px; border-radius: 3px;
    }
    .setting-group input:focus, .setting-group select:focus {
      outline: none; border-color: var(--cyan);
    }
    .btn-apply {
      width: 100%; background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.3);
      color: var(--cyan); font-family: 'Orbitron', sans-serif;
      font-size: 0.55em; font-weight: 500;
      letter-spacing: 0.1em; padding: 7px; border-radius: 3px;
      cursor: pointer;
    }
    .btn-apply:hover { background: rgba(0, 229, 255, 0.2); }

    .loading {
      color: var(--text-secondary); font-size: 0.8em;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <!-- State Vector Map (left 65%) -->
  <canvas id="mapCanvas"></canvas>

  <!-- 3JS Globe (right 35% upper) -->
  <div id="globeContainer">
    <canvas id="globeCanvas"></canvas>
  </div>

  <!-- HUD Overlays -->
  <div id="hud">
    <div class="hud-system">Marchog Planetary Surface Monitor</div>
    <div class="hud-clock">
      <div class="hud-clock-time" id="clock">--:--:--</div>
      <div class="hud-clock-date" id="clockDate">----.--.--</div>
    </div>
    <div class="hud-location">
      <div class="hud-location-name" id="locationName">LOADING...</div>
      <div class="hud-location-coords" id="locationCoords">---.---- N / ---.---- W</div>
    </div>

    <!-- Weather Callout (positioned by JS on map near beacon) -->
    <div class="hud-callout" id="callout">
      <div class="callout-inner">
        <div class="callout-temp" id="tempValue"><span class="loading">--</span></div>
        <div class="callout-condition-row">
          <span class="callout-condition-icon" id="conditionIcon"></span>
          <span class="callout-condition-text" id="conditionText">---</span>
        </div>
        <div class="callout-feels" id="feelsLike"></div>
        <div class="callout-divider"></div>
        <div class="callout-row">
          <span class="callout-label">Wind</span>
          <span class="callout-val" id="windValue">---</span>
        </div>
        <div class="callout-row">
          <span class="callout-label">Direction</span>
          <span class="callout-val" id="windDir">---</span>
        </div>
        <div class="callout-row">
          <span class="callout-label">Humidity</span>
          <span class="callout-val" id="humidity">---</span>
        </div>
        <div class="callout-row">
          <span class="callout-label">Pressure</span>
          <span class="callout-val" id="pressure">---</span>
        </div>
        <div class="callout-row">
          <span class="callout-label">Visibility</span>
          <span class="callout-val" id="visibility">---</span>
        </div>
        <div class="callout-row">
          <span class="callout-label">Clouds</span>
          <span class="callout-val" id="cloudCover">---</span>
        </div>
      </div>
    </div>

    <div class="globe-label">Global Position Reference</div>

    <!-- Forecast (bottom center) -->
    <div class="hud-forecast">
      <div class="forecast-strip" id="forecastStrip">
        <div class="loading" style="padding:8px 20px;">Loading forecast...</div>
      </div>
    </div>
  </div>

  <button id="settingsToggle" onclick="toggleSettings()">&#9881;</button>
  <div id="settingsPanel">
    <div class="settings-title">Weather Settings</div>
    <div class="setting-group">
      <label>Location Name</label>
      <input id="setLocationName" type="text" placeholder="e.g. Ellenton, FL">
    </div>
    <div class="setting-group">
      <label>Latitude</label>
      <input id="setLat" type="number" step="0.0001" placeholder="27.5222">
    </div>
    <div class="setting-group">
      <label>Longitude</label>
      <input id="setLon" type="number" step="0.0001" placeholder="-82.5276">
    </div>
    <div class="setting-group">
      <label>State (abbr)</label>
      <input id="setState" type="text" maxlength="2" placeholder="FL">
    </div>
    <div class="setting-group">
      <label>Units</label>
      <select id="setUnits">
        <option value="fahrenheit">Fahrenheit</option>
        <option value="celsius">Celsius</option>
      </select>
    </div>
    <button class="btn-apply" onclick="applySettings()">APPLY</button>
  </div>

// ═══════════════════════════════════════════════════════════════
//  MAP — Zoomed to active state
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let MW, MH; // map canvas dimensions

// Compute bounding box for a state + neighbors with padding
function getViewBounds() {
  const active = STATES.find(s => s.abbr === CFG.state);
  if (!active) return { lonMin: -130, lonMax: -63, latMin: 22, latMax: 52 };

  // Collect all points from active + neighbors
  const show = [active.abbr, ...active.neighbors];
  let lonMin = 999, lonMax = -999, latMin = 999, latMax = -999;
  STATES.forEach(s => {
    if (!show.includes(s.abbr)) return;
    s.paths.forEach(p => p.forEach(([lon, lat]) => {
      lonMin = Math.min(lonMin, lon);
      lonMax = Math.max(lonMax, lon);
      latMin = Math.min(latMin, lat);
      latMax = Math.max(latMax, lat);
    }));
  });

  // Padding (15% on each side)
  const lonPad = (lonMax - lonMin) * 0.15;
  const latPad = (latMax - latMin) * 0.15;
  return {
    lonMin: lonMin - lonPad, lonMax: lonMax + lonPad,
    latMin: latMin - latPad, latMax: latMax + latPad
  };
}

let viewBounds = getViewBounds();

function projectPoint(lon, lat) {
  const b = viewBounds;
  const aspect = (b.lonMax - b.lonMin) / (b.latMax - b.latMin);
  const canvasAspect = MW / MH;

  let mapW, mapH, mapX, mapY;
  if (aspect > canvasAspect) {
    // Width-constrained
    mapW = MW * 0.88;
    mapH = mapW / aspect;
    mapX = (MW - mapW) / 2;
    mapY = (MH - mapH) / 2;
  } else {
    // Height-constrained
    mapH = MH * 0.88;
    mapW = mapH * aspect;
    mapX = (MW - mapW) / 2;
    mapY = (MH - mapH) / 2;
  }

  return [
    mapX + ((lon - b.lonMin) / (b.lonMax - b.lonMin)) * mapW,
    mapY + ((b.latMax - lat) / (b.latMax - b.latMin)) * mapH
  ];
}

function beaconXY() { return projectPoint(CFG.lon, CFG.lat); }

let animT = 0, pulseT = 0;

function drawMap() {
  ctx.clearRect(0, 0, MW, MH);

  // Background
  const bg = ctx.createRadialGradient(MW*0.4, MH*0.45, 0, MW*0.4, MH*0.45, MW*0.8);
  bg.addColorStop(0, '#061020');
  bg.addColorStop(0.5, '#030a16');
  bg.addColorStop(1, '#010408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, MW, MH);

  animT += 0.016;
  pulseT += 0.04;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const active = STATES.find(s => s.abbr === CFG.state);
  const neighborSet = active ? new Set(active.neighbors) : new Set();

  // Grid lines
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.02)';
  ctx.lineWidth = 0.5;
  const b = viewBounds;
  const latStart = Math.floor(b.latMin / 2) * 2;
  const lonStart = Math.floor(b.lonMin / 2) * 2;
  for (let lat = latStart; lat <= b.latMax; lat += 2) {
    const [x1,y1] = projectPoint(b.lonMin, lat);
    const [x2,y2] = projectPoint(b.lonMax, lat);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  for (let lon = lonStart; lon <= b.lonMax; lon += 2) {
    const [x1,y1] = projectPoint(lon, b.latMin);
    const [x2,y2] = projectPoint(lon, b.latMax);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // ── Draw states (neighbors faded, active bright) ──
  STATES.forEach(s => {
    const isActive = s.abbr === CFG.state;
    const isNeighbor = neighborSet.has(s.abbr);
    if (!isActive && !isNeighbor) return;

    const fillAlpha = isActive ? 0.04 : 0.012;
    const strokeAlpha = isActive ? 0.45 : 0.1;
    const glowAlpha = isActive ? 0.6 : 0.15;
    const nodeAlpha = isActive ? 0.55 : 0.15;
    const lineWidth = isActive ? 1.2 : 0.6;

    s.paths.forEach(path => {
      if (path.length < 3) return;

      // Fill
      ctx.beginPath();
      const [sx,sy] = projectPoint(path[0][0], path[0][1]);
      ctx.moveTo(sx,sy);
      for (let i=1; i<path.length; i++) {
        const [px,py] = projectPoint(path[i][0], path[i][1]);
        ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(0, 229, 255, ${fillAlpha})`;
      ctx.fill();

      // Border glow
      if (isActive) {
        ctx.shadowColor = `rgba(0, 229, 255, ${glowAlpha})`;
        ctx.shadowBlur = 10;
      }
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      for (let i=1; i<path.length; i++) {
        const [px,py] = projectPoint(path[i][0], path[i][1]);
        ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.strokeStyle = `rgba(0, 229, 255, ${strokeAlpha})`;
      ctx.lineWidth = lineWidth + (isActive ? 0.8 : 0);
      ctx.stroke();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      // Crisp inner line
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      for (let i=1; i<path.length; i++) {
        const [px,py] = projectPoint(path[i][0], path[i][1]);
        ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.strokeStyle = `rgba(0, 229, 255, ${strokeAlpha * 1.5})`;
      ctx.lineWidth = lineWidth;
      ctx.stroke();

      // Vertex nodes
      path.forEach(([lon, lat]) => {
        const [x,y] = projectPoint(lon, lat);
        ctx.beginPath(); ctx.arc(x,y, isActive ? 2.5 : 1.2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0, 229, 255, ${nodeAlpha})`;
        ctx.fill();
      });
    });
  });

  // Network connections between visible state centers
  const visible = STATES.filter(s => s.abbr === CFG.state || neighborSet.has(s.abbr));
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
  ctx.lineWidth = 0.5;
  for (let i=0; i<visible.length; i++) {
    for (let j=i+1; j<visible.length; j++) {
      const [x1,y1] = projectPoint(visible[i].center[0], visible[i].center[1]);
      const [x2,y2] = projectPoint(visible[j].center[0], visible[j].center[1]);
      if (Math.hypot(x2-x1, y2-y1) < MW*0.35) {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      }
    }
  }

  // ── Location Beacon ──
  const [lx,ly] = beaconXY();
  const pr = 10 + Math.sin(pulseT) * 5;
  const pa = 0.45 + Math.sin(pulseT) * 0.2;

  // Outer rings
  ctx.beginPath(); ctx.arc(lx,ly, pr*3, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,229,255,${pa*0.1})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly, pr*2, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,229,255,${pa*0.2})`; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(lx,ly, pr*1.2, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(0,229,255,${pa*0.35})`; ctx.lineWidth=1.5; ctx.stroke();

  // Glow
  const lg = ctx.createRadialGradient(lx,ly, 0, lx,ly, pr);
  lg.addColorStop(0, `rgba(0,229,255,${pa})`);
  lg.addColorStop(0.5, `rgba(0,229,255,${pa*0.3})`);
  lg.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = lg;
  ctx.fillRect(lx-pr, ly-pr, pr*2, pr*2);

  // Core
  ctx.shadowColor='rgba(0,229,255,0.9)'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(lx,ly, 5, 0, Math.PI*2);
  ctx.fillStyle='#00e5ff'; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;

  // ── Leader line to callout ──
  const callout = document.getElementById('callout');
  if (callout && callout.offsetWidth) {
    const cr = callout.getBoundingClientRect();
    const mapRect = canvas.getBoundingClientRect();
    const cx = cr.left - mapRect.left + cr.width + 6;
    const cy = cr.top - mapRect.top + cr.height * 0.3;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(cx, cy);
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    // Small circle at callout end
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,229,255,0.3)'; ctx.fill();
  }

  // Scan line
  const scanY = (animT * 30) % MH;
  const sg = ctx.createLinearGradient(0, scanY-25, 0, scanY+25);
  sg.addColorStop(0, 'rgba(0,229,255,0)');
  sg.addColorStop(0.5, 'rgba(0,229,255,0.025)');
  sg.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, scanY-25, MW, 50);

  requestAnimationFrame(drawMap);
}

let globe = {};

function initGlobe() {
  const container = document.getElementById('globeContainer');
  const gc = document.getElementById('globeCanvas');
  const gw = container.clientWidth;
  const gh = container.clientHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, gw / gh, 0.1, 1000);
  camera.position.z = 2.8;

  const renderer = new THREE.WebGLRenderer({ canvas: gc, alpha: true, antialias: true });
  renderer.setSize(gw, gh);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  // Wireframe sphere
  const geo = new THREE.SphereGeometry(1, 36, 24);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff,
    wireframe: true,
    transparent: true,
    opacity: 0.08
  });
  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  // Brighter equator + prime meridian rings
  const ringGeo = new THREE.RingGeometry(1.002, 1.005, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide
  });
  const equator = new THREE.Mesh(ringGeo, ringMat);
  scene.add(equator);

  const meridian = new THREE.Mesh(ringGeo.clone(), ringMat.clone());
  meridian.rotation.y = Math.PI / 2;
  scene.add(meridian);

  // Outer glow sphere
  const glowGeo = new THREE.SphereGeometry(1.08, 32, 20);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0.03, side: THREE.BackSide
  });
  const glowSphere = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glowSphere);

  // Location dot on globe surface
  const locDotGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const locDotMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
  const locDot = new THREE.Mesh(locDotGeo, locDotMat);
  scene.add(locDot);

  // Convert lat/lon to 3D position on sphere
  function latLonToVec3(lat, lon, r) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
  }

  function updateLocDot() {
    const pos = latLonToVec3(CFG.lat, CFG.lon, 1.02);
    locDot.position.copy(pos);
  }
  updateLocDot();

  // Scatter dots for major cities (visual texture)
  const cities = [
    [40.7,-74],[51.5,-0.1],[35.7,139.7],[48.9,2.3],[-33.9,151.2],
    [55.8,37.6],[39.9,116.4],[28.6,77.2],[-23.5,-46.6],[19.4,-99.1],
    [34.1,-118.2],[41.9,-87.6],[29.8,-95.4],[33.4,-112.1],[37.8,-122.4],
    [1.3,103.8],[22.3,114.2],[-1.3,36.8],[30,31.2],[6.5,3.4],
  ];
  cities.forEach(([lat, lon]) => {
    const g = new THREE.SphereGeometry(0.012, 6, 6);
    const m = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.3 });
    const dot = new THREE.Mesh(g, m);
    dot.position.copy(latLonToVec3(lat, lon, 1.01));
    scene.add(dot);
  });

  globe = { scene, camera, renderer, sphere, equator, meridian, locDot, updateLocDot };

  function animateGlobe() {
    requestAnimationFrame(animateGlobe);
    sphere.rotation.y += 0.002;
    equator.rotation.y += 0.002;
    meridian.rotation.y += 0.002;
    glowSphere.rotation.y += 0.002;

    // Rotate all children (dots) with globe
    scene.children.forEach(c => {
      if (c !== camera && c !== sphere && c !== equator && c !== meridian && c !== glowSphere) {
        // Rotate dots around Y axis to match globe spin
      }
    });

    // Pulse location dot
    const s = 1 + Math.sin(Date.now() * 0.003) * 0.3;
    locDot.scale.set(s, s, s);
    locDot.material.opacity = 0.6 + Math.sin(Date.now() * 0.004) * 0.3;

    renderer.render(scene, camera);
  }
  animateGlobe();
}

function resizeGlobe() {
  if (!globe.renderer) return;
  const container = document.getElementById('globeContainer');
  const gw = container.clientWidth;
  const gh = container.clientHeight;
  globe.camera.aspect = gw / gh;
  globe.camera.updateProjectionMatrix();
  globe.renderer.setSize(gw, gh);
}

// ═══════════════════════════════════════════════════════════════
//  HUD POSITIONING
// ═══════════════════════════════════════════════════════════════

function positionHUD() {
  const [bx, by] = beaconXY();
  const callout = document.getElementById('callout');
  const cw = callout.offsetWidth || 200;
  const ch = callout.offsetHeight || 220;

  // Place callout to the left of beacon, clamped within map area
  let cx = bx - cw - 50;
  let cy = by - ch * 0.3;
  const mapW = MW;
  cx = Math.max(14, Math.min(cx, mapW - cw - 14));
  cy = Math.max(80, Math.min(cy, MH - ch - 60));
  callout.style.left = cx + 'px';
  callout.style.top = cy + 'px';
}

function resizeCanvas() {
  const mapEl = document.getElementById('mapCanvas');
  MW = mapEl.width = mapEl.clientWidth;
  MH = mapEl.height = mapEl.clientHeight;
  viewBounds = getViewBounds();
  positionHUD();
  resizeGlobe();
}

async function fetchWeather() {
  const tu = CFG.units === 'celsius' ? 'celsius' : 'fahrenheit';
  const wu = CFG.units === 'celsius' ? 'kmh' : 'mph';
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m,visibility`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
    + `&temperature_unit=${tu}&wind_speed_unit=${wu}`
    + `&timezone=auto&forecast_days=7`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    updateUI(data);
  } catch (e) { console.error('[weather] Fetch failed:', e); }
}

function updateUI(data) {
  const c = data.current;
  const us = CFG.units === 'celsius' ? '°C' : '°F';
  const ws = CFG.units === 'celsius' ? 'km/h' : 'mph';

  document.getElementById('locationName').textContent = CFG.name;
  document.getElementById('locationCoords').textContent =
    `${Math.abs(CFG.lat).toFixed(4)}° ${CFG.lat>=0?'N':'S'} / ${Math.abs(CFG.lon).toFixed(4)}° ${CFG.lon>=0?'E':'W'}`;

  document.getElementById('tempValue').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">${us}</span>`;

  const wmo = WMO_CODES[c.weather_code] || {desc:'Unknown',icon:'❓'};
  document.getElementById('conditionIcon').textContent = wmo.icon;
  document.getElementById('conditionText').textContent = wmo.desc.toUpperCase();
  document.getElementById('feelsLike').textContent = `Feels like ${Math.round(c.apparent_temperature)}${us}`;

  document.getElementById('windValue').textContent = `${Math.round(c.wind_speed_10m)} ${ws}`;
  document.getElementById('windDir').textContent = degToCompass(c.wind_direction_10m);
  document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
  document.getElementById('pressure').textContent = `${Math.round(c.surface_pressure)} hPa`;
  document.getElementById('visibility').textContent = c.visibility ? `${(c.visibility/1000).toFixed(1)} km` : '---';
  document.getElementById('cloudCover').textContent = `${c.cloud_cover}%`;

  if (data.daily) {
    const strip = document.getElementById('forecastStrip');
    strip.innerHTML = '';
    const d = data.daily;
    for (let i = 0; i < d.time.length; i++) {
      const date = new Date(d.time[i] + 'T12:00:00');
      const dayName = i === 0 ? 'TODAY' : DAYS[date.getDay()];
      const fwmo = WMO_CODES[d.weather_code[i]] || {icon:'❓'};
      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `
        <div class="forecast-day-name">${dayName}</div>
        <div class="forecast-day-icon">${fwmo.icon}</div>
        <div class="forecast-day-temp">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="forecast-day-lo">${Math.round(d.temperature_2m_min[i])}°</div>`;
      strip.appendChild(el);
    }
  }
  setTimeout(positionHUD, 50);
}

function degToCompass(deg) {
  const d = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16] + ` ${Math.round(deg)}°`;
}

// ═══════════════════════════════════════════════════════════════
//  CLOCK + SETTINGS + INIT
// ═══════════════════════════════════════════════════════════════

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('clockDate').textContent = now.toISOString().slice(0,10);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('setLocationName').value = CFG.name;
  document.getElementById('setLat').value = CFG.lat;
  document.getElementById('setLon').value = CFG.lon;
  document.getElementById('setState').value = CFG.state;
  document.getElementById('setUnits').value = CFG.units;
}

function applySettings() {
  const name = document.getElementById('setLocationName').value.trim();
  const lat = parseFloat(document.getElementById('setLat').value);
  const lon = parseFloat(document.getElementById('setLon').value);
  const state = document.getElementById('setState').value.trim().toUpperCase();
  if (name) CFG.name = name.toUpperCase();
  if (!isNaN(lat)) CFG.lat = lat;
  if (!isNaN(lon)) CFG.lon = lon;
  if (state && state.length === 2) CFG.state = state;
  CFG.units = document.getElementById('setUnits').value;
  document.getElementById('settingsPanel').classList.remove('open');
  viewBounds = getViewBounds();
  resizeCanvas();
  fetchWeather();
  if (globe.updateLocDot) globe.updateLocDot();
}

window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.type === 'weatherConfig' || msg.type === 'configure') {
    if (msg.lat) CFG.lat = parseFloat(msg.lat);
    if (msg.lon) CFG.lon = parseFloat(msg.lon);
    if (msg.name) CFG.name = msg.name.toUpperCase();
    if (msg.state) CFG.state = msg.state.toUpperCase();
    if (msg.units) CFG.units = msg.units;
    viewBounds = getViewBounds();
    resizeCanvas();
    fetchWeather();
    if (globe.updateLocDot) globe.updateLocDot();
  }
});

// ── INIT ──
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
requestAnimationFrame(drawMap);
initGlobe();
updateClock();
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, CFG.refreshInterval);

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight'].includes(e.key)) {
    window.parent.postMessage({type:'keydown', key:e.key}, '*');
  }
});
window.parent.postMessage({type:'pageReady', page:'weather'}, '*');
</script>
